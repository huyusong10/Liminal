<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Liminal{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="site-shell">
    <aside class="site-sidebar">
      <a class="brand" href="/">
        <span class="brand-mark">L</span>
        <span class="brand-copy">
          <strong>Liminal</strong>
          <small>CLI-first orchestration</small>
        </span>
      </a>
      <nav class="site-nav">
        <a href="/">Loops</a>
        <a href="/loops/new">Create Loop</a>
      </nav>
      <section class="sidebar-note">
        <h2>Local-first</h2>
        <p>Everything here runs on this machine. The CLI and Web console share the same SQLite state and run folders.</p>
      </section>
    </aside>
    <main class="site-main">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
