name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Check static JavaScript syntax
        run: |
          find src/loopora/static -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run Python static checks
        run: uv run ruff check src/loopora tests

      - name: Check whitespace-safe diff
        run: git diff --check

      - name: Run tests
        run: uv run pytest -q

  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Install Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run browser E2E tests
        run: uv run pytest tests/test_e2e_browser.py -q
