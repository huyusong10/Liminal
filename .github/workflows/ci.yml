name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-suffix: test-${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Check static JavaScript syntax
        run: |
          find src/loopora/static -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run Python static checks
        run: uv run ruff check src/loopora tests

      - name: Check whitespace-safe diff
        run: git diff --check

      - name: Build package
        run: |
          rm -rf tmp/package-check
          mkdir -p tmp/package-check
          uv build --out-dir tmp/package-check

      - name: Run tests
        run: uv run pytest -q tests/checks/contracts

  browser-journey:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-noble
      options: --user 1001
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-suffix: browser-journey

      - name: Install dependencies
        run: uv sync

      - name: Run browser journey checks
        timeout-minutes: 10
        run: uv run pytest tests/checks/journeys -q
