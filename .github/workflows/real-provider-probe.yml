name: Real Probe

on:
  workflow_dispatch:
    inputs:
      suites:
        description: "Comma-separated suites: real-agent, real-cli, release-web, or all"
        required: false
        default: "all"
      agent_targets:
        description: "Comma-separated real Agent host targets, for example codex,claude,opencode"
        required: false
        default: ""
      cli_targets:
        description: "Comma-separated real provider CLI targets, for example codex,claude,opencode"
        required: false
        default: ""
      real_agent_command_template:
        description: "Optional generic real Agent command template for Codex or fallback hosts"
        required: false
        default: ""
      real_claude_agent_command_template:
        description: "Optional Claude Code command template; ordinary release path should use host default model and effort"
        required: false
        default: ""
      real_opencode_agent_command_template:
        description: "Optional OpenCode command template; ordinary release path should use host default model and variant"
        required: false
        default: ""
      setup_command:
        description: "Optional shell command to install or configure real Agent hosts and provider CLIs"
        required: false
        default: ""
      pytest_args:
        description: "Optional extra pytest args passed through the real probe runner after --"
        required: false
        default: ""
      max_parallel:
        description: "Maximum independent probe subprocesses to run in parallel"
        required: false
        default: "3"
      allow_model_override:
        description: "Allow real probes to use explicit model, effort, or variant overrides for intentional override validation"
        required: false
        type: boolean
        default: false

jobs:
  real-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LOOPORA_REAL_AGENT_COMMAND_TEMPLATE: ${{ inputs.real_agent_command_template || vars.LOOPORA_REAL_AGENT_COMMAND_TEMPLATE }}
      LOOPORA_REAL_CLAUDE_AGENT_COMMAND_TEMPLATE: ${{ inputs.real_claude_agent_command_template || vars.LOOPORA_REAL_CLAUDE_AGENT_COMMAND_TEMPLATE }}
      LOOPORA_REAL_OPENCODE_AGENT_COMMAND_TEMPLATE: ${{ inputs.real_opencode_agent_command_template || vars.LOOPORA_REAL_OPENCODE_AGENT_COMMAND_TEMPLATE }}
      LOOPORA_REAL_PROBE_ALLOW_MODEL_OVERRIDE: ${{ inputs.allow_model_override && '1' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          cache-suffix: real-probe

      - name: Install dependencies
        run: uv sync

      - name: Optional host setup
        if: inputs.setup_command != ''
        shell: bash
        run: ${{ inputs.setup_command }}

      - name: Install browser runtime for release-web
        if: inputs.suites == '' || inputs.suites == 'all' || contains(inputs.suites, 'release-web')
        run: uv run playwright install --with-deps chromium

      - name: Summarize real probe selection
        shell: bash
        env:
          REAL_PROBE_SUITES: ${{ inputs.suites }}
          REAL_PROBE_AGENT_TARGETS: ${{ inputs.agent_targets }}
          REAL_PROBE_CLI_TARGETS: ${{ inputs.cli_targets }}
        run: |
          {
            echo "### Loopora real probe"
            echo
            echo "- Suites: ${REAL_PROBE_SUITES:-all}"
            echo "- Agent targets: ${REAL_PROBE_AGENT_TARGETS:-default}"
            echo "- CLI targets: ${REAL_PROBE_CLI_TARGETS:-default}"
            echo "- Agent command template configured: $([[ -n "${LOOPORA_REAL_AGENT_COMMAND_TEMPLATE:-}" ]] && echo yes || echo no)"
            echo "- Claude command template configured: $([[ -n "${LOOPORA_REAL_CLAUDE_AGENT_COMMAND_TEMPLATE:-}" ]] && echo yes || echo no)"
            echo "- OpenCode command template configured: $([[ -n "${LOOPORA_REAL_OPENCODE_AGENT_COMMAND_TEMPLATE:-}" ]] && echo yes || echo no)"
            echo "- External config override allowed: $([[ "${LOOPORA_REAL_PROBE_ALLOW_MODEL_OVERRIDE:-}" == "1" ]] && echo yes || echo no)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run real probe runner
        shell: bash
        env:
          REAL_PROBE_SUITES: ${{ inputs.suites }}
          REAL_PROBE_AGENT_TARGETS: ${{ inputs.agent_targets }}
          REAL_PROBE_CLI_TARGETS: ${{ inputs.cli_targets }}
          REAL_PROBE_MAX_PARALLEL: ${{ inputs.max_parallel }}
          REAL_PROBE_PYTEST_ARGS: ${{ inputs.pytest_args }}
        run: |
          suites="${REAL_PROBE_SUITES:-all}"
          max_parallel="${REAL_PROBE_MAX_PARALLEL:-3}"
          args=(--suite "$suites" --max-parallel "$max_parallel" --keep-logs)
          if [[ -n "${REAL_PROBE_AGENT_TARGETS:-}" ]]; then
            args+=(--agent-targets "$REAL_PROBE_AGENT_TARGETS")
          fi
          if [[ -n "${REAL_PROBE_CLI_TARGETS:-}" ]]; then
            args+=(--cli-targets "$REAL_PROBE_CLI_TARGETS")
          fi
          if [[ -n "${REAL_PROBE_PYTEST_ARGS:-}" ]]; then
            # shellcheck disable=SC2206
            extra_args=($REAL_PROBE_PYTEST_ARGS)
            uv run python tests/probes/real_environment/run_real_probes.py "${args[@]}" -- "${extra_args[@]}"
          else
            uv run python tests/probes/real_environment/run_real_probes.py "${args[@]}"
          fi
