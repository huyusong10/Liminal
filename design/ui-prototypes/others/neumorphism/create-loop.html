<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Loop - Loopora Neumorphism</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .create-header { margin-bottom: 2rem; padding: 1.5rem 2rem; background: var(--bg); box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); border-radius: var(--radius); }
        .create-header h1 { font-size: 1.75rem; font-weight: 700; color: var(--text-dark); margin-bottom: 0.5rem; }
        .create-header p { color: var(--text-muted); }
        .form-card { padding: 1.5rem 2rem; background: var(--bg); box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); border-radius: var(--radius); margin-bottom: 1.5rem; }
        .form-card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid rgba(163, 177, 198, 0.3); }
        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.8125rem; font-weight: 600; color: var(--text-dark); }
        .form-group input, .form-group select { padding: 0.875rem 1rem; background: var(--bg); border: none; border-radius: 12px; box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); font-size: 0.9375rem; color: var(--text-dark); outline: none; transition: var(--transition); }
        .form-group input:focus, .form-group select:focus { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .orch-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; }
        .orch-option input { position: absolute; opacity: 0; }
        .orch-card { display: flex; flex-direction: column; align-items: center; padding: 1.5rem; background: var(--bg); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); border-radius: 12px; cursor: pointer; transition: var(--transition); text-align: center; }
        .orch-option input:checked + .orch-card { box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); }
        .orch-card:hover { box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); }
        .orch-icon { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 0.75rem; background: var(--bg); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); }
        .orch-option:nth-child(1) .orch-icon { color: var(--accent-blue); }
        .orch-option:nth-child(2) .orch-icon { color: var(--success); }
        .orch-option:nth-child(3) .orch-icon { color: var(--warning); }
        .orch-option:nth-child(4) .orch-icon { color: var(--accent-purple); }
        .orch-option:nth-child(5) .orch-icon { color: #e53e3e; }
        .orch-name { font-weight: 700; color: var(--text-dark); margin-bottom: 0.25rem; }
        .orch-desc { font-size: 0.75rem; color: var(--text-muted); }
        .spec-editor { border-radius: 12px; overflow: hidden; background: var(--bg); box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }
        .editor-header { display: flex; justify-content: space-between; align-items: center; padding: 0.875rem 1rem; background: var(--bg); box-shadow: 0 2px 4px rgba(163, 177, 198, 0.2); }
        .editor-header span { font-size: 0.75rem; color: var(--text-muted); }
        .editor { width: 100%; min-height: 300px; padding: 1rem; background: transparent; border: none; font-size: 0.9375rem; line-height: 1.7; resize: vertical; outline: none; color: var(--text-dark); }
        .form-actions { display: flex; justify-content: flex-end; gap: 1rem; padding-top: 1rem; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } .orch-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <svg class="logo" viewBox="0 0 512 512" width="40" height="40">
                <rect width="512" height="512" rx="120" fill="#e0e5ec"/>
                <path d="M 130 256 C 130 140, 245 140, 256 256 C 267 372, 382 372, 382 256 C 382 140, 267 140, 256 256 C 245 372, 130 372, 130 256 Z" fill="none" stroke="#5b8cff" stroke-width="40" stroke-linecap="round"/>
                <circle cx="256" cy="256" r="28" fill="#e0e5ec" stroke="#5b8cff" stroke-width="6"/>
            </svg>
            <span class="brand-text">Loopora</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Loops</a>
            <a href="orchestrations.html">Orchestrations</a>
            <a href="roles.html">Roles</a>
            <a href="tutorial.html">Tutorial</a>
        </div>
    </nav>

    <main class="container">
        <header class="create-header">
            <h1>Create a New Loop</h1>
            <p>Configure your loop parameters and select an orchestration.</p>
        </header>

        <form>
            <div class="form-card">
                <h3>Basic Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Loop Name</label>
                        <input type="text" placeholder="e.g., Search Rollout Migration">
                    </div>
                    <div class="form-group">
                        <label>Working Directory</label>
                        <input type="text" placeholder="/absolute/path/to/project">
                    </div>
                </div>
            </div>

            <div class="form-card">
                <h3>Orchestration</h3>
                <div class="orch-grid">
                    <label class="orch-option">
                        <input type="radio" name="orch" value="build" checked>
                        <div class="orch-card">
                            <div class="orch-icon">🔄</div>
                            <div class="orch-name">Build First</div>
                            <div class="orch-desc">Initial implementations</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="inspect">
                        <div class="orch-card">
                            <div class="orch-icon">🔍</div>
                            <div class="orch-name">Inspect First</div>
                            <div class="orch-desc">Regression analysis</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="triage">
                        <div class="orch-card">
                            <div class="orch-icon">⚡</div>
                            <div class="orch-name">Triage First</div>
                            <div class="orch-desc">Multi-issue diagnosis</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="repair">
                        <div class="orch-card">
                            <div class="orch-icon">🛠️</div>
                            <div class="orch-name">Repair Loop</div>
                            <div class="orch-desc">Iterative repairs</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="benchmark">
                        <div class="orch-card">
                            <div class="orch-icon">📊</div>
                            <div class="orch-name">Benchmark Loop</div>
                            <div class="orch-desc">Metrics-driven work</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-card">
                <h3>Spec</h3>
                <div class="spec-editor">
                    <div class="editor-header">
                        <span>Markdown</span>
                        <div class="editor-actions">
                            <button type="button" class="btn-ghost">Load Template</button>
                            <button type="button" class="btn-ghost">Preview</button>
                        </div>
                    </div>
                    <textarea class="editor" placeholder="# Task

Describe objective...

# Done When

- [ ] Criterion 1
- [ ] Criterion 2

# Guardrails

- Constraint 1
- Constraint 2"></textarea>
                </div>
            </div>

            <div class="form-card">
                <h3>Configuration</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Max Iterations</label>
                        <input type="number" value="8" min="1" max="50">
                    </div>
                    <div class="form-group">
                        <label>Executor</label>
                        <select><option>codex</option><option>claude</option><option>gpt-4</option></select>
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <select><option>gpt-5.4</option><option>claude-opus</option><option>gpt-4-turbo</option></select>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a href="index.html" class="btn-ghost">Cancel</a>
                <button type="submit" class="btn-primary">Create Loop</button>
            </div>
        </form>
    </main>
</body>
</html>
