<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Loop — Material Design 3</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="top-app-bar">
        <div class="leading">
            <button class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </button>
            <span class="headline-small">Create Loop</span>
        </div>
    </nav>

    <main class="main-content">
        <div class="content-wrapper" style="max-width: 800px;">
            <div class="stepper">
                <div class="step active">
                    <div class="step-indicator">1</div>
                    <span class="step-label">Basic Info</span>
                </div>
                <div class="step-line"></div>
                <div class="step">
                    <div class="step-indicator">2</div>
                    <span class="step-label">Configure</span>
                </div>
                <div class="step-line"></div>
                <div class="step">
                    <div class="step-indicator">3</div>
                    <span class="step-label">Review</span>
                </div>
            </div>

            <div class="card elevated">
                <div class="card-header">
                    <h2 class="headline-small" style="margin: 0;">Basic Information</h2>
                </div>
                <div class="card-content">
                    <div class="form-field">
                        <label class="label-large">Loop Name</label>
                        <div class="text-field">
                            <input type="text" placeholder="e.g., Search Migration" class="body-large">
                        </div>
                        <span class="supporting-text">Choose a descriptive name for your workflow</span>
                    </div>

                    <div class="form-field">
                        <label class="label-large">Description</label>
                        <div class="text-field">
                            <textarea rows="3" placeholder="What does this loop accomplish?" class="body-large"></textarea>
                        </div>
                    </div>

                    <div class="form-field">
                        <label class="label-large">Orchestration</label>
                        <div class="dropdown">
                            <button class="dropdown-trigger">
                                <span>Select orchestration</span>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M7 10l5 5 5-5z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card elevated" style="margin-top: 16px;">
                <div class="card-header">
                    <h2 class="headline-small" style="margin: 0;">Success Criteria</h2>
                </div>
                <div class="card-content">
                    <div class="checkbox-list">
                        <label class="checkbox-item">
                            <input type="checkbox" class="md-checkbox">
                            <span class="body-large">All tests passing</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" class="md-checkbox">
                            <span class="body-large">Code review approved</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" class="md-checkbox">
                            <span class="body-large">Performance benchmarks met</span>
                        </label>
                    </div>
                    <button class="text-btn" style="margin-top: 16px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                        </svg>
                        Add Criterion
                    </button>
                </div>
            </div>

            <div class="button-row" style="margin-top: 24px;">
                <button class="text-btn">Cancel</button>
                <button class="filled-btn">
                    Continue
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="margin-left: 8px;">
                        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>
</body>
</html>
