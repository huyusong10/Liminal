<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Loop - Loopora Minimalist</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <svg class="logo" viewBox="0 0 512 512" width="32" height="32">
                <rect width="512" height="512" rx="128" fill="#1f1a14"/>
                <path d="M 130 256 C 130 140, 245 140, 256 256 C 267 372, 382 372, 382 256 C 382 140, 267 140, 256 256 C 245 372, 130 372, 130 256 Z"
                      fill="none" stroke="url(#loop-grad)" stroke-width="44" stroke-linecap="round"/>
                <circle cx="256" cy="256" r="28" fill="#1f1a14" stroke="#f09057" stroke-width="6"/>
                <defs>
                    <linearGradient id="loop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#d66a36"/>
                        <stop offset="50%" stop-color="#f09057"/>
                        <stop offset="100%" stop-color="#0d7c66"/>
                    </linearGradient>
                </defs>
            </svg>
            <span class="brand-text">Loopora</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Loops</a>
            <a href="orchestrations.html">Orchestrations</a>
            <a href="roles.html">Roles</a>
            <a href="tutorial.html">Tutorial</a>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <div>
                <h1>Create a new loop.</h1>
                <p>Define the task, set guardrails, choose your workflow.</p>
            </div>
        </header>

        <form class="create-form">
            <div class="form-section">
                <h3>Basic Info</h3>
                <div class="form-row">
                    <div class="form-field">
                        <label for="name">Loop Name</label>
                        <input type="text" id="name" placeholder="e.g., Search Rollout Migration" required>
                    </div>
                    <div class="form-field">
                        <label for="workdir">Working Directory</label>
                        <input type="text" id="workdir" placeholder="/absolute/path/to/project" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Orchestration</h3>
                <div class="orchestration-options">
                    <label class="option-card selected">
                        <input type="radio" name="orchestration" value="build-first" checked>
                        <span class="option-icon">B</span>
                        <span class="option-content">
                            <span class="option-title">Build First</span>
                            <span class="option-desc">Best for initial implementations</span>
                        </span>
                    </label>

                    <label class="option-card">
                        <input type="radio" name="orchestration" value="inspect-first">
                        <span class="option-icon inspect">I</span>
                        <span class="option-content">
                            <span class="option-title">Inspect First</span>
                            <span class="option-desc">Best for regression analysis</span>
                        </span>
                    </label>

                    <label class="option-card">
                        <input type="radio" name="orchestration" value="triage-first">
                        <span class="option-icon triage">T</span>
                        <span class="option-content">
                            <span class="option-title">Triage First</span>
                            <span class="option-desc">Best for multi-issue diagnosis</span>
                        </span>
                    </label>

                    <label class="option-card">
                        <input type="radio" name="orchestration" value="repair-loop">
                        <span class="option-icon repair">R</span>
                        <span class="option-content">
                            <span class="option-title">Repair Loop</span>
                            <span class="option-desc">Best for iterative repairs</span>
                        </span>
                    </label>

                    <label class="option-card">
                        <input type="radio" name="orchestration" value="benchmark-loop">
                        <span class="option-icon benchmark">Bm</span>
                        <span class="option-content">
                            <span class="option-title">Benchmark Loop</span>
                            <span class="option-desc">Best for metrics-driven work</span>
                        </span>
                    </label>
                </div>
            </div>

            <div class="form-section">
                <h3>Spec</h3>
                <div class="spec-editor">
                    <div class="editor-toolbar">
                        <span>Markdown</span>
                        <div class="toolbar-actions">
                            <button type="button" class="btn-ghost">Load Template</button>
                            <button type="button" class="btn-ghost">Preview</button>
                        </div>
                    </div>
                    <textarea class="editor-content" placeholder="# Task

Describe what needs to be done...

# Done When

- [ ] Criterion 1
- [ ] Criterion 2

# Guardrails

- Constraint 1
- Constraint 2

# Role Notes

Specific instructions for roles..."></textarea>
                </div>
            </div>

            <div class="form-section">
                <h3>Configuration</h3>
                <div class="form-row">
                    <div class="form-field">
                        <label for="max-iters">Max Iterations</label>
                        <input type="number" id="max-iters" value="8" min="1" max="50">
                    </div>
                    <div class="form-field">
                        <label for="executor">Executor</label>
                        <select id="executor">
                            <option>codex</option>
                            <option>claude</option>
                            <option>gpt-4</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label for="model">Model</label>
                        <select id="model">
                            <option>gpt-5.4</option>
                            <option>claude-opus</option>
                            <option>gpt-4-turbo</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a href="index.html" class="btn-ghost">Cancel</a>
                <button type="submit" class="btn-primary">Create Loop</button>
            </div>
        </form>
    </main>

    <style>
        .create-form {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .form-section {
            padding: 1.5rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            background: var(--color-bg);
        }

        .form-section h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
            margin-bottom: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-field label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-text);
        }

        .form-field input,
        .form-field select {
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            font-size: 0.9375rem;
            background: var(--color-bg);
            color: var(--color-text);
            transition: var(--transition);
        }

        .form-field input:focus,
        .form-field select:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        .form-field input::placeholder {
            color: var(--color-text-muted);
        }

        .orchestration-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem;
        }

        .option-card {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            background: var(--color-bg);
            cursor: pointer;
            transition: var(--transition);
        }

        .option-card:hover {
            border-color: #d0d0d0;
        }

        .option-card.selected {
            border-color: var(--color-accent);
            background: var(--color-surface);
        }

        .option-card input {
            display: none;
        }

        .option-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-accent);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: var(--radius);
            flex-shrink: 0;
        }

        .option-icon.inspect { background: #0d7c66; }
        .option-icon.triage { background: #d66a36; }
        .option-icon.repair { background: #8b5cf6; }
        .option-icon.benchmark { background: #0ea5e9; }

        .option-content {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .option-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-text);
        }

        .option-desc {
            font-size: 0.75rem;
            color: var(--color-text-muted);
        }

        .spec-editor {
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .editor-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.75rem;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
        }

        .editor-toolbar span {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .toolbar-actions {
            display: flex;
            gap: 0.25rem;
        }

        .editor-content {
            width: 100%;
            min-height: 300px;
            padding: 1rem;
            border: none;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            line-height: 1.6;
            resize: vertical;
            background: var(--color-bg);
            color: var(--color-text);
        }

        .editor-content:focus {
            outline: none;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            padding-top: 1rem;
            border-top: 1px solid var(--color-border);
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .orchestration-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</body>
</html>
