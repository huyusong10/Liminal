<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Loop // Loopora CYBERPUNK</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .create-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .create-header h1 {
            font-family: var(--font-display);
            font-size: 1.75rem;
            letter-spacing: 2px;
        }

        .create-header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .form-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-panel h3 {
            font-family: var(--font-display);
            font-size: 0.75rem;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.625rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.875rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(5, 217, 232, 0.2);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .orch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .orch-option {
            position: relative;
        }

        .orch-option input {
            position: absolute;
            opacity: 0;
        }

        .orch-card {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .orch-option input:checked + .orch-card {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(5, 217, 232, 0.1);
        }

        .orch-card:hover {
            border-color: var(--neon-cyan);
        }

        .orch-id {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.625rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .orch-option:nth-child(1) .orch-id { background: var(--neon-pink); color: var(--bg); }
        .orch-option:nth-child(2) .orch-id { background: var(--success); color: var(--bg); }
        .orch-option:nth-child(3) .orch-id { background: var(--warning); color: var(--bg); }
        .orch-option:nth-child(4) .orch-id { background: var(--neon-purple); color: var(--bg); }
        .orch-option:nth-child(5) .orch-id { background: var(--neon-cyan); color: var(--bg); }

        .orch-name {
            font-family: var(--font-display);
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 0.25rem;
        }

        .orch-desc {
            font-size: 0.625rem;
            color: var(--text-muted);
        }

        .editor-container {
            border: 1px solid var(--border);
            background: var(--bg);
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
        }

        .editor-header span {
            font-size: 0.625rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .editor-actions {
            display: flex;
            gap: 0.5rem;
        }

        .editor {
            width: 100%;
            min-height: 300px;
            padding: 1rem;
            background: var(--bg);
            border: none;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.8125rem;
            line-height: 1.8;
            resize: vertical;
            outline: none;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .orch-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="grid-overlay"></div>

    <nav class="nav">
        <div class="nav-brand">
            <svg class="logo glitch" viewBox="0 0 512 512" width="40" height="40">
                <rect width="512" height="512" rx="0" fill="#0a0a0f"/>
                <path d="M 130 256 C 130 140, 245 140, 256 256 C 267 372, 382 372, 382 256 C 382 140, 267 140, 256 256 C 245 372, 130 372, 130 256 Z"
                      fill="none" stroke="#ff2a6d" stroke-width="48" stroke-linecap="square"/>
                <circle cx="256" cy="256" r="32" fill="#0a0a0f" stroke="#05d9e8" stroke-width="8"/>
            </svg>
            <div class="brand-text">
                <span class="brand-main">LOOPORA</span>
                <span class="brand-sub">v2.0.77</span>
            </div>
        </div>
        <div class="nav-links">
            <a href="index.html">[LOOPS]</a>
            <a href="orchestrations.html">[ORCH]</a>
            <a href="roles.html">[ROLES]</a>
            <a href="tutorial.html">[HELP]</a>
        </div>
    </nav>

    <main class="container">
        <header class="create-header">
            <h1>INITIALIZE_NEW_LOOP</h1>
            <p>Configure task parameters and select orchestration protocol.</p>
        </header>

        <form>
            <div class="form-panel">
                <h3>BASIC_PARAMETERS</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Loop Name</label>
                        <input type="text" placeholder="SEARCH_ROLLOUT_MIGRATION">
                    </div>
                    <div class="form-group">
                        <label>Working Directory</label>
                        <input type="text" placeholder="/absolute/path/to/project">
                    </div>
                </div>
            </div>

            <div class="form-panel">
                <h3>ORCHESTRATION_PROTOCOL</h3>
                <div class="orch-grid">
                    <label class="orch-option">
                        <input type="radio" name="orch" value="build" checked>
                        <div class="orch-card">
                            <div class="orch-id">B</div>
                            <div class="orch-name">BUILD_FIRST</div>
                            <div class="orch-desc">Initial implementations</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="inspect">
                        <div class="orch-card">
                            <div class="orch-id">I</div>
                            <div class="orch-name">INSPECT_FIRST</div>
                            <div class="orch-desc">Regression analysis</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="triage">
                        <div class="orch-card">
                            <div class="orch-id">T</div>
                            <div class="orch-name">TRIAGE_FIRST</div>
                            <div class="orch-desc">Multi-issue diagnosis</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="repair">
                        <div class="orch-card">
                            <div class="orch-id">R</div>
                            <div class="orch-name">REPAIR_LOOP</div>
                            <div class="orch-desc">Iterative repairs</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="benchmark">
                        <div class="orch-card">
                            <div class="orch-id">BM</div>
                            <div class="orch-name">BENCHMARK_LOOP</div>
                            <div class="orch-desc">Metrics-driven work</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-panel">
                <h3>SPECIFICATION_DATA</h3>
                <div class="editor-container">
                    <div class="editor-header">
                        <span>MARKDOWN_FORMAT</span>
                        <div class="editor-actions">
                            <button type="button" class="btn-ghost">[LOAD_TEMPLATE]</button>
                            <button type="button" class="btn-ghost">[PREVIEW]</button>
                        </div>
                    </div>
                    <textarea class="editor" placeholder="# TASK

Describe objective...

# DONE_WHEN

- [ ] Criterion_1
- [ ] Criterion_2

# GUARDRAILS

- Constraint_1
- Constraint_2

# ROLE_NOTES

Role-specific instructions..."></textarea>
                </div>
            </div>

            <div class="form-panel">
                <h3>CONFIGURATION</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Max Iterations</label>
                        <input type="number" value="8" min="1" max="50">
                    </div>
                    <div class="form-group">
                        <label>Executor</label>
                        <select>
                            <option>codex</option>
                            <option>claude</option>
                            <option>gpt-4</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <select>
                            <option>gpt-5.4</option>
                            <option>claude-opus</option>
                            <option>gpt-4-turbo</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a href="index.html" class="btn-ghost">[CANCEL]</a>
                <button type="submit" class="btn-primary">[INITIALIZE]</button>
            </div>
        </form>
    </main>

    <div class="corner-decoration top-left"></div>
    <div class="corner-decoration top-right"></div>
    <div class="corner-decoration bottom-left"></div>
    <div class="corner-decoration bottom-right"></div>
</body>
</html>
