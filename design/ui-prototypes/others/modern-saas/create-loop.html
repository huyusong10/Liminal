<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Loop — Loopora</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .create-layout {
            max-width: 800px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .form-section {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .section-header {
            padding: 20px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-body {
            padding: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row:last-child {
            margin-bottom: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group label span {
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.15s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(13, 124, 102, 0.1);
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
        }

        .orch-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .orch-option {
            position: relative;
        }

        .orch-option input {
            position: absolute;
            opacity: 0;
        }

        .orch-card {
            padding: 20px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            text-align: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .orch-option input:checked + .orch-card {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .orch-card:hover {
            border-color: var(--border-hover);
        }

        .orch-letter {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .orch-option input:checked + .orch-card .orch-letter {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .orch-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .orch-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .editor-box {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .editor-tabs {
            display: flex;
            gap: 4px;
        }

        .editor-tab {
            padding: 6px 12px;
            font-size: 13px;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .editor-tab.active {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .editor-actions {
            display: flex;
            gap: 8px;
        }

        .editor-btn {
            padding: 6px 12px;
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .editor-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding-top: 8px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s ease;
        }

        .btn:hover {
            border-color: var(--border-hover);
            background: var(--bg-secondary);
        }

        @media (max-width: 1024px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .orch-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 32 32" width="28" height="28">
                        <circle cx="16" cy="16" r="14" fill="none" stroke="currentColor" stroke-width="2"/>
                        <circle cx="16" cy="16" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
                        <circle cx="16" cy="16" r="4" fill="currentColor"/>
                    </svg>
                </div>
                <span class="logo-text">Loopora</span>
            </a>
        </div>
        <div class="sidebar-nav">
            <a href="index.html" class="nav-item active">Loops</a>
            <a href="#" class="nav-item">Orchestrations</a>
            <a href="#" class="nav-item">Roles</a>
            <a href="#" class="nav-item">Settings</a>
        </div>
    </nav>

    <main class="main">
        <div class="create-layout">
            <header class="page-header">
                <h1>Create Loop</h1>
                <p class="subtitle">Configure your new AI workflow orchestration</p>
            </header>

            <form>
                <div class="form-section">
                    <div class="section-header">Basic Information</div>
                    <div class="section-body">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Loop Name</label>
                                <input type="text" placeholder="e.g., Search Rollout Migration">
                            </div>
                            <div class="form-group">
                                <label>Working Directory</label>
                                <input type="text" placeholder="/absolute/path/to/project">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-header">Orchestration</div>
                    <div class="section-body">
                        <div class="orch-grid">
                            <label class="orch-option">
                                <input type="radio" name="orch" value="build" checked>
                                <div class="orch-card">
                                    <div class="orch-letter">B</div>
                                    <div class="orch-name">Build First</div>
                                    <div class="orch-desc">Initial implementations</div>
                                </div>
                            </label>
                            <label class="orch-option">
                                <input type="radio" name="orch" value="inspect">
                                <div class="orch-card">
                                    <div class="orch-letter">I</div>
                                    <div class="orch-name">Inspect First</div>
                                    <div class="orch-desc">Regression analysis</div>
                                </div>
                            </label>
                            <label class="orch-option">
                                <input type="radio" name="orch" value="triage">
                                <div class="orch-card">
                                    <div class="orch-letter">T</div>
                                    <div class="orch-name">Triage First</div>
                                    <div class="orch-desc">Multi-issue diagnosis</div>
                                </div>
                            </label>
                            <label class="orch-option">
                                <input type="radio" name="orch" value="repair">
                                <div class="orch-card">
                                    <div class="orch-letter">R</div>
                                    <div class="orch-name">Repair Loop</div>
                                    <div class="orch-desc">Iterative repairs</div>
                                </div>
                            </label>
                            <label class="orch-option">
                                <input type="radio" name="orch" value="benchmark">
                                <div class="orch-card">
                                    <div class="orch-letter">Bm</div>
                                    <div class="orch-name">Benchmark</div>
                                    <div class="orch-desc">Metrics-driven work</div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-header">Specification</div>
                    <div class="section-body">
                        <div class="form-group full-width">
                            <div class="editor-box">
                                <div class="editor-header">
                                    <div class="editor-tabs">
                                        <button type="button" class="editor-tab active">Write</button>
                                        <button type="button" class="editor-tab">Preview</button>
                                    </div>
                                    <div class="editor-actions">
                                        <button type="button" class="editor-btn">Load Template</button>
                                    </div>
                                </div>
                                <textarea class="editor" placeholder="# Task

Describe what needs to be done...

# Done When

- [ ] Criterion 1
- [ ] Criterion 2

# Guardrails

- Constraint 1
- Constraint 2"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-header">Configuration</div>
                    <div class="section-body">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Max Iterations</label>
                                <input type="number" value="8" min="1" max="50">
                            </div>
                            <div class="form-group">
                                <label>Executor</label>
                                <select>
                                    <option>codex</option>
                                    <option>claude</option>
                                    <option>gpt-4</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Model</label>
                                <select>
                                    <option>gpt-5.4</option>
                                    <option>claude-opus</option>
                                    <option>gpt-4-turbo</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="index.html" class="btn">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create Loop</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
