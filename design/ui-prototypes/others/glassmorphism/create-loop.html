<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Loop - Loopora Glassmorphism</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .create-header { margin-bottom: 2rem; padding: 1.5rem; background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: var(--radius); border: 1px solid var(--glass-border); }
        .create-header h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
        .create-header p { color: var(--text-secondary); }
        .form-card { padding: 1.5rem; background: var(--glass-bg); backdrop-filter: blur(16px); border-radius: var(--radius); border: 1px solid var(--glass-border); margin-bottom: 1.5rem; }
        .form-card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.8125rem; font-weight: 600; }
        .form-group input, .form-group select { padding: 0.75rem 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; font-size: 0.9375rem; color: var(--text); outline: none; transition: var(--transition); }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent-pink); box-shadow: 0 0 20px rgba(255, 0, 110, 0.2); }
        .orch-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
        .orch-option input { position: absolute; opacity: 0; }
        .orch-card { display: flex; flex-direction: column; align-items: center; padding: 1.25rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; cursor: pointer; transition: var(--transition); text-align: center; }
        .orch-option input:checked + .orch-card { border-color: var(--accent-pink); background: rgba(255, 0, 110, 0.1); }
        .orch-card:hover { border-color: var(--glass-highlight); }
        .orch-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 0.75rem; background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple)); }
        .orch-option:nth-child(2) .orch-icon { background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); }
        .orch-option:nth-child(3) .orch-icon { background: linear-gradient(135deg, #ffaa00, #ff006e); }
        .orch-option:nth-child(4) .orch-icon { background: linear-gradient(135deg, var(--accent-purple), #d300c5); }
        .orch-option:nth-child(5) .orch-icon { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); }
        .orch-name { font-weight: 700; margin-bottom: 0.25rem; }
        .orch-desc { font-size: 0.75rem; color: var(--text-muted); }
        .spec-editor { border: 1px solid var(--glass-border); border-radius: 12px; overflow: hidden; }
        .editor-header { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--glass-border); }
        .editor-header span { font-size: 0.75rem; color: var(--text-muted); }
        .editor { width: 100%; min-height: 300px; padding: 1rem; background: transparent; border: none; color: var(--text); font-size: 0.875rem; line-height: 1.8; resize: vertical; outline: none; }
        .form-actions { display: flex; justify-content: flex-end; gap: 1rem; padding-top: 1rem; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } .orch-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="gradient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="nav">
        <div class="nav-brand">
            <svg class="logo" viewBox="0 0 512 512" width="40" height="40">
                <circle cx="256" cy="256" r="240" fill="rgba(255,255,255,0.1)" stroke="url(#glass-grad)" stroke-width="3"/>
                <path d="M 130 256 C 130 140, 245 140, 256 256 C 267 372, 382 372, 382 256 C 382 140, 267 140, 256 256 C 245 372, 130 372, 130 256 Z" fill="none" stroke="#ff006e" stroke-width="36" stroke-linecap="round"/>
                <circle cx="256" cy="256" r="24" fill="rgba(255,255,255,0.2)" stroke="#ff006e" stroke-width="4"/>
            </svg>
            <span class="brand-text">Loopora</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Loops</a>
            <a href="orchestrations.html">Orchestrations</a>
            <a href="roles.html">Roles</a>
            <a href="tutorial.html">Tutorial</a>
        </div>
    </nav>

    <main class="container">
        <header class="create-header">
            <h1>Create a New Loop</h1>
            <p>Configure your loop parameters and select an orchestration.</p>
        </header>

        <form>
            <div class="form-card">
                <h3>Basic Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Loop Name</label>
                        <input type="text" placeholder="e.g., Search Rollout Migration">
                    </div>
                    <div class="form-group">
                        <label>Working Directory</label>
                        <input type="text" placeholder="/absolute/path/to/project">
                    </div>
                </div>
            </div>

            <div class="form-card">
                <h3>Orchestration</h3>
                <div class="orch-grid">
                    <label class="orch-option">
                        <input type="radio" name="orch" value="build" checked>
                        <div class="orch-card">
                            <div class="orch-icon">🔄</div>
                            <div class="orch-name">Build First</div>
                            <div class="orch-desc">Initial implementations</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="inspect">
                        <div class="orch-card">
                            <div class="orch-icon">🔍</div>
                            <div class="orch-name">Inspect First</div>
                            <div class="orch-desc">Regression analysis</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="triage">
                        <div class="orch-card">
                            <div class="orch-icon">⚡</div>
                            <div class="orch-name">Triage First</div>
                            <div class="orch-desc">Multi-issue diagnosis</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="repair">
                        <div class="orch-card">
                            <div class="orch-icon">🛠️</div>
                            <div class="orch-name">Repair Loop</div>
                            <div class="orch-desc">Iterative repairs</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="benchmark">
                        <div class="orch-card">
                            <div class="orch-icon">📊</div>
                            <div class="orch-name">Benchmark Loop</div>
                            <div class="orch-desc">Metrics-driven work</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-card">
                <h3>Specification</h3>
                <div class="spec-editor">
                    <div class="editor-header">
                        <span>Markdown</span>
                        <div class="editor-actions">
                            <button type="button" class="btn-ghost">Load Template</button>
                            <button type="button" class="btn-ghost">Preview</button>
                        </div>
                    </div>
                    <textarea class="editor" placeholder="# Task

Describe objective...

# Done When

- [ ] Criterion 1
- [ ] Criterion 2

# Guardrails

- Constraint 1
- Constraint 2"></textarea>
                </div>
            </div>

            <div class="form-card">
                <h3>Configuration</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Max Iterations</label>
                        <input type="number" value="8" min="1" max="50">
                    </div>
                    <div class="form-group">
                        <label>Executor</label>
                        <select><option>codex</option><option>claude</option><option>gpt-4</option></select>
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <select><option>gpt-5.4</option><option>claude-opus</option><option>gpt-4-turbo</option></select>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a href="index.html" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary">Create Loop</button>
            </div>
        </form>
    </main>
</body>
</html>
