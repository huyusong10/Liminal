<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Loop — Loopora</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .create-header {
            text-align: center;
            margin-bottom: 80px;
            padding-bottom: 48px;
            border-bottom: 1px solid var(--border);
        }

        .create-header h1 {
            font-family: var(--font-serif);
            font-size: 42px;
            font-weight: 400;
            margin-bottom: 16px;
        }

        .jp-title {
            font-size: 14px;
            color: var(--text-tertiary);
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        .form-section {
            margin-bottom: 64px;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .section-number {
            font-family: var(--font-serif);
            font-size: 32px;
            color: var(--accent);
            font-weight: 300;
        }

        .section-name {
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 32px;
            margin-bottom: 32px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 16px 20px;
            border: 1px solid var(--border);
            background: var(--bg);
            font-family: var(--font-sans);
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
            line-height: 1.8;
        }

        .orch-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }

        .orch-option {
            position: relative;
        }

        .orch-option input {
            position: absolute;
            opacity: 0;
        }

        .orch-card {
            padding: 32px 24px;
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .orch-option input:checked + .orch-card {
            border-color: var(--accent);
            background: rgba(196, 92, 72, 0.02);
        }

        .orch-card:hover {
            border-color: var(--accent-subtle);
        }

        .orch-letter {
            font-family: var(--font-serif);
            font-size: 36px;
            color: var(--text-tertiary);
            margin-bottom: 16px;
            transition: color 0.3s ease;
        }

        .orch-option input:checked + .orch-card .orch-letter {
            color: var(--accent);
        }

        .orch-name {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            color: var(--text);
            margin-bottom: 8px;
        }

        .orch-desc {
            font-size: 10px;
            color: var(--text-tertiary);
        }

        .editor-box {
            border: 1px solid var(--border);
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .editor-header span {
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
        }

        .editor-actions {
            display: flex;
            gap: 12px;
        }

        .editor-btn {
            padding: 6px 12px;
            font-size: 10px;
            letter-spacing: 0.05em;
            text-transform: lowercase;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .editor-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .form-actions {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding-top: 48px;
            border-top: 1px solid var(--border);
        }

        .btn {
            padding: 16px 40px;
            font-size: 13px;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-primary {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .btn-primary:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .orch-grid {
                grid-template-columns: 1fr;
            }

            .create-header h1 {
                font-size: 28px;
            }

            .form-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .btn {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="ink-wash"></div>

    <nav class="nav">
        <a href="index.html" class="logo">
            <span class="logo-icon">
                <svg viewBox="0 0 60 60" width="32" height="32">
                    <circle cx="30" cy="30" r="28" fill="none" stroke="currentColor" stroke-width="1"/>
                    <circle cx="30" cy="30" r="20" fill="none" stroke="currentColor" stroke-width="1"/>
                    <circle cx="30" cy="30" r="8" fill="currentColor"/>
                </svg>
            </span>
            <span class="logo-text">loopora</span>
        </a>
        <div class="nav-links">
            <a href="index.html" class="active">loops</a>
            <a href="#">orch</a>
            <a href="#">roles</a>
            <a href="#">about</a>
        </div>
    </nav>

    <main class="container">
        <header class="create-header">
            <h1>New Loop</h1>
            <p class="jp-title">新しい循環を始める — Begin a new cycle</p>
        </header>

        <form>
            <div class="form-section">
                <div class="section-label">
                    <span class="section-number">壱</span>
                    <span class="section-name">Basic Information</span>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Loop Name</label>
                        <input type="text" placeholder="e.g., Search Rollout Migration">
                    </div>
                    <div class="form-group">
                        <label>Working Directory</label>
                        <input type="text" placeholder="/absolute/path/to/project">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-label">
                    <span class="section-number">弐</span>
                    <span class="section-name">Orchestration</span>
                </div>
                <div class="orch-grid">
                    <label class="orch-option">
                        <input type="radio" name="orch" value="build" checked>
                        <div class="orch-card">
                            <div class="orch-letter">B</div>
                            <div class="orch-name">build first</div>
                            <div class="orch-desc">initial implementations</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="inspect">
                        <div class="orch-card">
                            <div class="orch-letter">I</div>
                            <div class="orch-name">inspect first</div>
                            <div class="orch-desc">regression analysis</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="triage">
                        <div class="orch-card">
                            <div class="orch-letter">T</div>
                            <div class="orch-name">triage first</div>
                            <div class="orch-desc">multi-issue diagnosis</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="repair">
                        <div class="orch-card">
                            <div class="orch-letter">R</div>
                            <div class="orch-name">repair loop</div>
                            <div class="orch-desc">iterative repairs</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="benchmark">
                        <div class="orch-card">
                            <div class="orch-letter">Bm</div>
                            <div class="orch-name">benchmark</div>
                            <div class="orch-desc">metrics-driven</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-section">
                <div class="section-label">
                    <span class="section-number">参</span>
                    <span class="section-name">Specification</span>
                </div>
                <div class="form-group full-width">
                    <div class="editor-box">
                        <div class="editor-header">
                            <span>Markdown</span>
                            <div class="editor-actions">
                                <button type="button" class="editor-btn">load template</button>
                                <button type="button" class="editor-btn">preview</button>
                            </div>
                        </div>
                        <textarea class="editor" placeholder="# Task

Describe what needs to be done...

# Done When

- [ ] Criterion 1
- [ ] Criterion 2

# Guardrails

- Constraint 1
- Constraint 2"></textarea>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-label">
                    <span class="section-number">四</span>
                    <span class="section-name">Configuration</span>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Max Iterations</label>
                        <input type="number" value="8" min="1" max="50">
                    </div>
                    <div class="form-group">
                        <label>Executor</label>
                        <select>
                            <option>codex</option>
                            <option>claude</option>
                            <option>gpt-4</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <select>
                            <option>gpt-5.4</option>
                            <option>claude-opus</option>
                            <option>gpt-4-turbo</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a href="index.html" class="btn">cancel</a>
                <button type="submit" class="btn btn-primary">create loop</button>
            </div>
        </form>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span class="footer-brand">loopora</span>
            <span class="footer-divider"></span>
            <span class="footer-version">v2.0</span>
        </div>
    </footer>
</body>
</html>
