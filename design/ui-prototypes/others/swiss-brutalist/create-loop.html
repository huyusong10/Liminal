<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE LOOP — Swiss Brutalist</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .create-header { margin-bottom: 48px; padding-bottom: 24px; border-bottom: 4px solid var(--border); }
        .create-header h1 { font-size: 48px; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 8px; }
        .create-header p { font-size: 16px; color: var(--text-secondary); }
        .form-section { margin-bottom: 48px; padding: 32px; border: 2px solid var(--border); }
        .form-section h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 24px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); }
        .form-group input, .form-group select { padding: 16px; border: 2px solid var(--grid); font-size: 15px; background: var(--bg); outline: none; transition: border-color 0.2s ease; }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
        .orch-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2px; background: var(--border); }
        .orch-option input { position: absolute; opacity: 0; }
        .orch-card { display: flex; flex-direction: column; padding: 24px; background: var(--bg); cursor: pointer; transition: all 0.2s ease; }
        .orch-option input:checked + .orch-card { background: var(--text); color: var(--bg); }
        .orch-card:hover { background: var(--grid); }
        .orch-option input:checked + .orch-card:hover { background: var(--text); }
        .orch-letter { font-size: 48px; font-weight: 900; margin-bottom: 16px; }
        .orch-name { font-size: 14px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .orch-desc { font-size: 12px; color: var(--text-secondary); }
        .orch-option input:checked + .orch-card .orch-desc { color: rgba(255,255,255,0.7); }
        .editor-box { border: 2px solid var(--grid); }
        .editor-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--grid); border-bottom: 2px solid var(--grid); }
        .editor-header span { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); }
        .editor { width: 100%; min-height: 300px; padding: 24px; border: none; font-family: var(--font-mono); font-size: 13px; line-height: 1.8; resize: vertical; outline: none; }
        .form-actions { display: flex; justify-content: flex-end; gap: 16px; padding-top: 24px; border-top: 4px solid var(--border); }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } .orch-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <div class="logo-mark">
                <svg viewBox="0 0 100 100" width="48" height="48">
                    <rect x="10" y="10" width="80" height="80" fill="none" stroke="currentColor" stroke-width="8"/>
                    <path d="M 25 50 Q 25 25, 50 25 Q 75 25, 75 50 Q 75 75, 50 75 Q 25 75, 25 50" fill="none" stroke="currentColor" stroke-width="8"/>
                    <circle cx="50" cy="50" r="10" fill="currentColor"/>
                </svg>
            </div>
            <span class="brand-text">LOOPORA</span>
        </div>
        <div class="nav-links">
            <a href="index.html">01 — LOOPS</a>
            <a href="#">02 — ORCH</a>
            <a href="#">03 — ROLES</a>
            <a href="#">04 — HELP</a>
        </div>
    </nav>

    <main class="container">
        <header class="create-header">
            <h1>CREATE NEW LOOP</h1>
            <p>Define the task, set guardrails, choose your workflow.</p>
        </header>

        <form>
            <div class="form-section">
                <h3>Basic Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Loop Name</label>
                        <input type="text" placeholder="Search Rollout Migration">
                    </div>
                    <div class="form-group">
                        <label>Working Directory</label>
                        <input type="text" placeholder="/absolute/path/to/project">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Orchestration</h3>
                <div class="orch-grid">
                    <label class="orch-option">
                        <input type="radio" name="orch" value="build" checked>
                        <div class="orch-card">
                            <div class="orch-letter">B</div>
                            <div class="orch-name">Build First</div>
                            <div class="orch-desc">Initial implementations</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="inspect">
                        <div class="orch-card">
                            <div class="orch-letter">I</div>
                            <div class="orch-name">Inspect First</div>
                            <div class="orch-desc">Regression analysis</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="triage">
                        <div class="orch-card">
                            <div class="orch-letter">T</div>
                            <div class="orch-name">Triage First</div>
                            <div class="orch-desc">Multi-issue diagnosis</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="repair">
                        <div class="orch-card">
                            <div class="orch-letter">R</div>
                            <div class="orch-name">Repair Loop</div>
                            <div class="orch-desc">Iterative repairs</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="benchmark">
                        <div class="orch-card">
                            <div class="orch-letter">Bm</div>
                            <div class="orch-name">Benchmark Loop</div>
                            <div class="orch-desc">Metrics-driven work</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-section">
                <h3>Specification</h3>
                <div class="editor-box">
                    <div class="editor-header">
                        <span>Markdown</span>
                        <div>
                            <button type="button" class="btn-secondary" style="font-size: 10px; padding: 8px 12px;">Load Template</button>
                            <button type="button" class="btn-secondary" style="font-size: 10px; padding: 8px 12px;">Preview</button>
                        </div>
                    </div>
                    <textarea class="editor" placeholder="# Task

Describe what needs to be done...

# Done When

- [ ] Criterion 1
- [ ] Criterion 2

# Guardrails

- Constraint 1
- Constraint 2"></textarea>
                </div>
            </div>

            <div class="form-section">
                <h3>Configuration</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Max Iterations</label>
                        <input type="number" value="8" min="1" max="50">
                    </div>
                    <div class="form-group">
                        <label>Executor</label>
                        <select><option>codex</option><option>claude</option><option>gpt-4</option></select>
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <select><option>gpt-5.4</option><option>claude-opus</option><option>gpt-4-turbo</option></select>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a href="index.html" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary">Create Loop →</button>
            </div>
        </form>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <span>LOOPORA v2.0</span>
            <span>LOCAL-FIRST LOOP ORCHESTRATION</span>
        </div>
    </footer>
</body>
</html>
