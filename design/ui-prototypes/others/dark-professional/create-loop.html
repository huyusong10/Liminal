<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Loop — Loopora</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .create-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .create-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .create-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .section-header {
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        .section-body {
            padding: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row:last-child {
            margin-bottom: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(214, 106, 54, 0.1);
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
        }

        .orch-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .orch-option {
            position: relative;
        }

        .orch-option input {
            position: absolute;
            opacity: 0;
        }

        .orch-card {
            padding: 20px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .orch-option input:checked + .orch-card {
            border-color: var(--accent);
            background: rgba(214, 106, 54, 0.1);
        }

        .orch-card:hover {
            border-color: var(--border-hover);
        }

        .orch-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .orch-option input:checked + .orch-card .orch-icon {
            background: var(--accent);
            color: white;
        }

        .orch-name {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .orch-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        .editor-box {
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
        }

        .editor-tabs {
            display: flex;
            gap: 4px;
        }

        .editor-tab {
            padding: 6px 12px;
            font-size: 12px;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .editor-tab.active {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .editor-actions {
            display: flex;
            gap: 8px;
        }

        .editor-btn {
            padding: 6px 12px;
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .editor-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding-top: 24px;
        }

        @media (max-width: 1024px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .orch-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-left">
            <a href="index.html" class="logo">
                <svg viewBox="0 0 40 40" width="32" height="32">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#d66a36"/>
                            <stop offset="100%" style="stop-color:#0d7c66"/>
                        </linearGradient>
                    </defs>
                    <circle cx="20" cy="20" r="18" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
                    <circle cx="20" cy="20" r="12" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
                    <circle cx="20" cy="20" r="5" fill="url(#logoGrad)"/>
                </svg>
                <span>loopora</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="active">Loops</a>
                <a href="#">Orch</a>
                <a href="#">Roles</a>
                <a href="#">Settings</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M11.7422 10.3439C12.5329 9.2673 13 7.9382 13 6.5C13 2.91015 10.0899 0 6.5 0C2.91015 0 0 2.91015 0 6.5C0 10.0899 2.91015 13 6.5 13C7.9382 13 9.2673 12.5329 10.3439 11.7422L14.1464 15.5446C14.3417 15.7399 14.6583 15.7399 14.8536 15.5446L15.5446 14.8536C15.7399 14.6583 15.7399 14.3417 15.5446 14.1464L11.7422 10.3439ZM6.5 11C4.01472 11 2 8.98528 2 6.5C2 4.01472 4.01472 2 6.5 2C8.98528 2 11 4.01472 11 6.5C11 8.98528 8.98528 11 6.5 11Z"/>
                </svg>
                <input type="text" placeholder="Search loops...">
                <span class="shortcut">⌘K</span>
            </div>
            <button class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/>
                </svg>
            </button>
            <div class="user-avatar">JD</div>
        </div>
    </nav>

    <main class="container">
        <header class="create-header">
            <h1>Create New Loop</h1>
            <p>Configure your AI workflow orchestration.</p>
        </header>

        <form>
            <div class="form-section">
                <div class="section-header">Basic Information</div>
                <div class="section-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Loop Name</label>
                            <input type="text" placeholder="e.g., Search Rollout Migration">
                        </div>
                        <div class="form-group">
                            <label>Working Directory</label>
                            <input type="text" placeholder="/absolute/path/to/project">
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-header">Orchestration</div>
                <div class="section-body">
                    <div class="orch-grid">
                        <label class="orch-option">
                            <input type="radio" name="orch" value="build" checked>
                            <div class="orch-card">
                                <div class="orch-icon">B</div>
                                <div class="orch-name">Build First</div>
                                <div class="orch-desc">Initial implementations</div>
                            </div>
                        </label>
                        <label class="orch-option">
                            <input type="radio" name="orch" value="inspect">
                            <div class="orch-card">
                                <div class="orch-icon">I</div>
                                <div class="orch-name">Inspect First</div>
                                <div class="orch-desc">Regression analysis</div>
                            </div>
                        </label>
                        <label class="orch-option">
                            <input type="radio" name="orch" value="triage">
                            <div class="orch-card">
                                <div class="orch-icon">T</div>
                                <div class="orch-name">Triage First</div>
                                <div class="orch-desc">Multi-issue diagnosis</div>
                            </div>
                        </label>
                        <label class="orch-option">
                            <input type="radio" name="orch" value="repair">
                            <div class="orch-card">
                                <div class="orch-icon">R</div>
                                <div class="orch-name">Repair Loop</div>
                                <div class="orch-desc">Iterative repairs</div>
                            </div>
                        </label>
                        <label class="orch-option">
                            <input type="radio" name="orch" value="benchmark">
                            <div class="orch-card">
                                <div class="orch-icon">Bm</div>
                                <div class="orch-name">Benchmark</div>
                                <div class="orch-desc">Metrics-driven work</div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-header">Specification</div>
                <div class="section-body">
                    <div class="form-group full-width">
                        <div class="editor-box">
                            <div class="editor-header">
                                <div class="editor-tabs">
                                    <button type="button" class="editor-tab active">Write</button>
                                    <button type="button" class="editor-tab">Preview</button>
                                </div>
                                <div class="editor-actions">
                                    <button type="button" class="editor-btn">Load Template</button>
                                </div>
                            </div>
                            <textarea class="editor" placeholder="# Task

Describe what needs to be done...

# Done When

- [ ] Criterion 1
- [ ] Criterion 2

# Guardrails

- Constraint 1
- Constraint 2"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-header">Configuration</div>
                <div class="section-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Max Iterations</label>
                            <input type="number" value="8" min="1" max="50">
                        </div>
                        <div class="form-group">
                            <label>Executor</label>
                            <select>
                                <option>codex</option>
                                <option>claude</option>
                                <option>gpt-4</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Model</label>
                            <select>
                                <option>gpt-5.4</option>
                                <option>claude-opus</option>
                                <option>gpt-4-turbo</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <a href="index.html" class="btn">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Loop</button>
            </div>
        </form>
    </main>
</body>
</html>
