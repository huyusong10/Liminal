<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Loop - Loopora Organic</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .create-header { margin-bottom: 2rem; }
        .create-header h1 { font-family: var(--font-display); font-size: 2rem; margin-bottom: 0.5rem; }
        .create-header p { color: var(--color-text-muted); }
        .form-card { background: var(--color-surface); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow-soft); }
        .form-card h3 { font-family: var(--font-display); font-size: 0.875rem; color: var(--color-text-muted); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--color-border); }
        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.8125rem; font-weight: 600; color: var(--color-text); }
        .form-group input, .form-group select { padding: 0.75rem 1rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: 0.9375rem; background: var(--color-surface); color: var(--color-text); outline: none; transition: var(--transition); }
        .form-group input:focus, .form-group select:focus { border-color: var(--color-border-strong); box-shadow: 0 0 0 3px rgba(134, 239, 172, 0.2); }
        .orch-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
        .orch-option input { position: absolute; opacity: 0; }
        .orch-card { display: flex; flex-direction: column; align-items: center; padding: 1.25rem; border: 2px solid var(--color-border); border-radius: var(--radius-lg); cursor: pointer; transition: var(--transition); text-align: center; }
        .orch-option input:checked + .orch-card { border-color: var(--color-border-strong); background: var(--color-surface-soft); }
        .orch-card:hover { border-color: var(--color-border-strong); transform: translateY(-2px); }
        .orch-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; margin-bottom: 0.75rem; }
        .orch-option:nth-child(1) .orch-icon { background: linear-gradient(135deg, #65a30d, #84cc16); }
        .orch-option:nth-child(2) .orch-icon { background: linear-gradient(135deg, #0d9488, #14b8a6); }
        .orch-option:nth-child(3) .orch-icon { background: linear-gradient(135deg, #d97706, #f59e0b); }
        .orch-option:nth-child(4) .orch-icon { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
        .orch-option:nth-child(5) .orch-icon { background: linear-gradient(135deg, #0ea5e9, #38bdf8); }
        .orch-name { font-weight: 700; color: var(--color-text); margin-bottom: 0.25rem; }
        .orch-desc { font-size: 0.75rem; color: var(--color-text-muted); }
        .spec-editor { border: 1px solid var(--color-border); border-radius: var(--radius-md); overflow: hidden; }
        .editor-header { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; background: var(--color-surface-soft); border-bottom: 1px solid var(--color-border); }
        .editor-header span { font-size: 0.75rem; color: var(--color-text-muted); }
        .editor-actions { display: flex; gap: 0.5rem; }
        .editor { width: 100%; min-height: 300px; padding: 1rem; border: none; background: var(--color-surface); font-size: 0.9375rem; line-height: 1.7; resize: vertical; outline: none; }
        .form-actions { display: flex; justify-content: flex-end; gap: 1rem; padding-top: 1rem; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } .orch-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <svg class="logo" viewBox="0 0 512 512" width="40" height="40">
                <circle cx="256" cy="256" r="240" fill="#f0fdf4" />
                <path d="M 130 256 C 130 140, 245 140, 256 256 C 267 372, 382 372, 382 256 C 382 140, 267 140, 256 256 C 245 372, 130 372, 130 256 Z" fill="none" stroke="#65a30d" stroke-width="40" stroke-linecap="round" />
                <circle cx="256" cy="256" r="24" fill="#fff" stroke="#14b8a6" stroke-width="4" />
            </svg>
            <span class="brand-text">Loopora</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Loops</a>
            <a href="orchestrations.html">Orchestrations</a>
            <a href="roles.html">Roles</a>
            <a href="tutorial.html">Tutorial</a>
        </div>
    </nav>
    <main class="container">
        <header class="create-header">
            <h1>Plant a new seed.</h1>
            <p>Define the task, set guardrails, choose your workflow.</p>
        </header>
        <form>
            <div class="form-card">
                <h3>Basic Info</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Loop Name</label>
                        <input type="text" placeholder="e.g., Search Rollout Migration">
                    </div>
                    <div class="form-group">
                        <label>Working Directory</label>
                        <input type="text" placeholder="/absolute/path/to/project">
                    </div>
                </div>
            </div>
            <div class="form-card">
                <h3>Orchestration</h3>
                <div class="orch-grid">
                    <label class="orch-option">
                        <input type="radio" name="orch" value="build" checked>
                        <div class="orch-card">
                            <div class="orch-icon">🌱</div>
                            <div class="orch-name">Build First</div>
                            <div class="orch-desc">Initial implementations</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="inspect">
                        <div class="orch-card">
                            <div class="orch-icon">🔍</div>
                            <div class="orch-name">Inspect First</div>
                            <div class="orch-desc">Regression analysis</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="triage">
                        <div class="orch-card">
                            <div class="orch-icon">🌿</div>
                            <div class="orch-name">Triage First</div>
                            <div class="orch-desc">Multi-issue diagnosis</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="repair">
                        <div class="orch-card">
                            <div class="orch-icon">🔄</div>
                            <div class="orch-name">Repair Loop</div>
                            <div class="orch-desc">Iterative repairs</div>
                        </div>
                    </label>
                    <label class="orch-option">
                        <input type="radio" name="orch" value="benchmark">
                        <div class="orch-card">
                            <div class="orch-icon">📊</div>
                            <div class="orch-name">Benchmark Loop</div>
                            <div class="orch-desc">Metrics-driven work</div>
                        </div>
                    </label>
                </div>
            </div>
            <div class="form-card">
                <h3>Spec</h3>
                <div class="spec-editor">
                    <div class="editor-header">
                        <span>Markdown</span>
                        <div class="editor-actions">
                            <button type="button" class="btn-ghost">Load Template</button>
                            <button type="button" class="btn-ghost">Preview</button>
                        </div>
                    </div>
                    <textarea class="editor" placeholder="# Task

Describe what needs to be done...

# Done When

- [ ] Criterion 1
- [ ] Criterion 2

# Guardrails

- Constraint 1
- Constraint 2

# Role Notes

Specific instructions for roles..."></textarea>
                </div>
            </div>
            <div class="form-card">
                <h3>Configuration</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Max Iterations</label>
                        <input type="number" value="8" min="1" max="50">
                    </div>
                    <div class="form-group">
                        <label>Executor</label>
                        <select><option>codex</option><option>claude</option><option>gpt-4</option></select>
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <select><option>gpt-5.4</option><option>claude-opus</option><option>gpt-4-turbo</option></select>
                    </div>
                </div>
            </div>
            <div class="form-actions">
                <a href="index.html" class="btn-ghost">Cancel</a>
                <button type="submit" class="btn-primary">Create Loop</button>
            </div>
        </form>
    </main>
    <div class="leaf-decoration leaf-1">🍃</div>
    <div class="leaf-decoration leaf-2">🌿</div>
</body>
</html>
