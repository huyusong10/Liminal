<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- V2: Modern Loop - Inspired by original infinity but simplified -->
  <defs>
    <linearGradient id="v2-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d66a36" />
      <stop offset="50%" stop-color="#c17a4e" />
      <stop offset="100%" stop-color="#0d7c66" />
    </linearGradient>
  </defs>

  <!-- Clean white background -->
  <rect width="512" height="512" rx="128" fill="#ffffff" />

  <!-- Simplified infinity/loop shape -->
  <!-- Left arc -->
  <path d="M 140 256 C 140 170, 210 140, 256 140 C 302 140, 372 170, 372 256"
        fill="none"
        stroke="url(#v2-grad)"
        stroke-width="32"
        stroke-linecap="round" />

  <!-- Right arc (mirrored) -->
  <path d="M 372 256 C 372 342, 302 372, 256 372 C 210 372, 140 342, 140 256"
        fill="none"
        stroke="url(#v2-grad)"
        stroke-width="32"
        stroke-linecap="round"
        opacity="0.6" />

  <!-- Center convergence point -->
  <circle cx="256" cy="256" r="38" fill="url(#v2-grad)" />
  <circle cx="256" cy="256" r="14" fill="#ffffff" />
</svg>