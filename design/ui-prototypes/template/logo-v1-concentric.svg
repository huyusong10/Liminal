<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- V1: Refined Concentric Circles - Clean & Minimal -->
  <defs>
    <linearGradient id="v1-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d66a36" />
      <stop offset="100%" stop-color="#0d7c66" />
    </linearGradient>
  </defs>

  <!-- Background with subtle rounded corners -->
  <rect width="512" height="512" rx="128" fill="#ffffff" />

  <!-- Three concentric circles with gradient stroke -->
  <!-- Outer circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#v1-grad)" stroke-width="24" stroke-linecap="round" />

  <!-- Middle circle -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="url(#v1-grad)" stroke-width="20" stroke-linecap="round" opacity="0.85" />

  <!-- Inner circle (filled) -->
  <circle cx="256" cy="256" r="45" fill="url(#v1-grad)" />

  <!-- Subtle center dot -->
  <circle cx="256" cy="256" r="12" fill="#ffffff" />
</svg>