<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- V3: Gradient Ripple - Modern interpretation with dynamic rings -->
  <defs>
    <!-- Orange gradient for outer rings -->
    <linearGradient id="v3-grad-outer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d66a36" />
      <stop offset="100%" stop-color="#e87e4a" />
    </linearGradient>

    <!-- Teal gradient for inner rings -->
    <linearGradient id="v3-grad-inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a9a7e" />
      <stop offset="100%" stop-color="#0d7c66" />
    </linearGradient>

    <!-- Full spectrum gradient for center -->
    <linearGradient id="v3-grad-center" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d66a36" />
      <stop offset="100%" stop-color="#0d7c66" />
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="512" height="512" rx="128" fill="#ffffff" />

  <!-- Outer ring - Orange tone -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="url(#v3-grad-outer)" stroke-width="28" stroke-linecap="round" />

  <!-- Middle ring - Blend -->
  <circle cx="256" cy="256" r="115" fill="none" stroke="#c17a4e" stroke-width="24" stroke-linecap="round" opacity="0.8" />

  <!-- Inner ring - Teal tone -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="url(#v3-grad-inner)" stroke-width="20" stroke-linecap="round" />

  <!-- Center core with full gradient -->
  <circle cx="256" cy="256" r="28" fill="url(#v3-grad-center)" />

  <!-- Highlight dot -->
  <circle cx="256" cy="256" r="10" fill="#ffffff" opacity="0.9" />
</svg>