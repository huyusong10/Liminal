<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- V2: Soft Gradient - Thinner, more elegant -->
  <defs>
    <linearGradient id="v2-soft-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d66a36" />
      <stop offset="50%" stop-color="#c17a5e" />
      <stop offset="100%" stop-color="#0d7c66" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="128" fill="#ffffff" />

  <!-- Infinity loop with thinner stroke -->
  <path d="M 130 256 C 130 140, 245 140, 256 256 C 267 372, 382 372, 382 256 C 382 140, 267 140, 256 256 C 245 372, 130 372, 130 256 Z"
        fill="none"
        stroke="url(#v2-soft-grad)"
        stroke-width="28"
        stroke-linecap="round"
        stroke-linejoin="round" />

  <!-- Center dot with matching gradient -->
  <circle cx="256" cy="256" r="22" fill="#ffffff" stroke="url(#v2-soft-grad)" stroke-width="5" />
</svg>