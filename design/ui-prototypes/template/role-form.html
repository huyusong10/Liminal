<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Role — Loopora</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="navbar-left">
                <a href="index.html" class="brand">
                    <div class="brand-logo">
                        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
                            <circle cx="16" cy="16" r="9" stroke="currentColor" stroke-width="2"/>
                            <circle cx="16" cy="16" r="4" fill="currentColor"/>
                        </svg>
                    </div>
                    <span class="brand-name">Loopora</span>
                </a>
                <div class="navbar-nav">
                    <a href="index.html" class="nav-link">Loops</a>
                    <a href="orchestrations.html" class="nav-link">Orchestrations</a>
                    <a href="roles.html" class="nav-link active">Roles</a>
                    <a href="tools.html" class="nav-link">Tools</a>
                    <a href="tutorial.html" class="nav-link">Tutorial</a>
                </div>
            </div>
            <div class="navbar-right">
                <div class="user-menu">
                    <div class="user-avatar">JD</div>
                </div>
            </div>
        </nav>

        <div class="main-container">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <div class="section-header">Role</div>
                    <nav class="sidebar-nav">
                        <a href="roles.html" class="nav-item">
                            <span class="nav-icon">‹</span>
                            <span class="nav-label">Back to List</span>
                        </a>
                    </nav>
                </div>
            </aside>

            <main class="content">
                <a href="roles.html" class="back-nav">‹ Back to Roles</a>

                <div style="max-width: 800px;">
                    <h1 style="font-size: 28px; font-weight: 700; margin-bottom: 8px;">Create Role</h1>
                    <p style="color: var(--text-secondary); margin-bottom: 32px;">Define a new role for workflow orchestration</p>

                    <form>
                        <div class="card" style="margin-bottom: 20px;">
                            <div class="card-header">
                                <div class="card-title">Basic Information</div>
                            </div>
                            <div class="card-body">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">Role Name *</label>
                                        <input type="text" class="form-input" placeholder="e.g., Builder">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">ID *</label>
                                        <input type="text" class="form-input" placeholder="e.g., builder">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">Icon</label>
                                        <input type="text" class="form-input" placeholder="Emoji or icon name, e.g., 🔨">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Color</label>
                                        <select class="form-input form-select">
                                            <option>Blue (Default)</option>
                                            <option>Green</option>
                                            <option>Orange</option>
                                            <option>Purple</option>
                                            <option>Red</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">Short Description</label>
                                    <input type="text" class="form-input" placeholder="One-line description of this role's purpose">
                                </div>
                            </div>
                        </div>

                        <div class="card" style="margin-bottom: 20px;">
                            <div class="card-header">
                                <div class="card-title">Detailed Description</div>
                            </div>
                            <div class="card-body" style="padding: 0;">
                                <textarea class="form-textarea" style="border: none; border-radius: 0; min-height: 200px;" placeholder="Describe what this role does, when it should be used, and how it fits into the workflow..."></textarea>
                            </div>
                        </div>

                        <div class="card" style="margin-bottom: 20px;">
                            <div class="card-header">
                                <div class="card-title">System Prompt</div>
                            </div>
                            <div class="card-body" style="padding: 0;">
                                <textarea class="form-textarea" style="border: none; border-radius: 0; min-height: 280px; font-family: var(--font-mono); font-size: 13px;" placeholder="# Role: {role_name}

You are the {role_name} in a loop orchestration system.

## Your Responsibilities

- Responsibility 1
- Responsibility 2
- Responsibility 3

## When to Stop

- Stop condition 1
- Stop condition 2

## Output Format

```
Your output should follow this format...
```"></textarea>
                            </div>
                        </div>

                        <div class="card" style="margin-bottom: 24px;">
                            <div class="card-header">
                                <div class="card-title">Tools</div>
                            </div>
                            <div class="card-body">
                                <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">Select the tools this role can use.</p>
                                <div style="display: flex; flex-direction: column; gap: 10px;">
                                    <label style="display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--bg-tertiary); border-radius: var(--radius-sm); cursor: pointer;">
                                        <input type="checkbox" checked style="width: 18px; height: 18px; accent-color: var(--accent);">
                                        <div>
                                            <div style="font-weight: 500; font-size: 14px;">file_read</div>
                                            <div style="font-size: 12px; color: var(--text-secondary);">Read file contents</div>
                                        </div>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--bg-tertiary); border-radius: var(--radius-sm); cursor: pointer;">
                                        <input type="checkbox" checked style="width: 18px; height: 18px; accent-color: var(--accent);">
                                        <div>
                                            <div style="font-weight: 500; font-size: 14px;">file_write</div>
                                            <div style="font-size: 12px; color: var(--text-secondary);">Write file contents</div>
                                        </div>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--bg-tertiary); border-radius: var(--radius-sm); cursor: pointer;">
                                        <input type="checkbox" checked style="width: 18px; height: 18px; accent-color: var(--accent);">
                                        <div>
                                            <div style="font-weight: 500; font-size: 14px;">shell</div>
                                            <div style="font-size: 12px; color: var(--text-secondary);">Execute shell commands</div>
                                        </div>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--bg-tertiary); border-radius: var(--radius-sm); cursor: pointer;">
                                        <input type="checkbox" style="width: 18px; height: 18px; accent-color: var(--accent);">
                                        <div>
                                            <div style="font-weight: 500; font-size: 14px;">web_search</div>
                                            <div style="font-size: 12px; color: var(--text-secondary);">Search the web</div>
                                        </div>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div style="display: flex; justify-content: space-between; padding-top: 8px;">
                            <a href="roles.html" class="btn btn-ghost">Cancel</a>
                            <div style="display: flex; gap: 12px;">
                                <button type="button" class="btn btn-secondary">Save Draft</button>
                                <button type="submit" class="btn btn-primary">Create Role</button>
                            </div>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
