<!doctype html>
<html
  lang="{% if 'zh' in request.headers.get('accept-language', '').lower() %}zh-CN{% else %}en{% endif %}"
  data-locale="{% if 'zh' in request.headers.get('accept-language', '').lower() %}zh{% else %}en{% endif %}"
  data-theme="light"
>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Loopora{% endblock %}</title>
  <link rel="icon" href="/logo/logo.svg" sizes="any" type="image/svg+xml" />
  <link rel="shortcut icon" href="/logo/logo.svg" type="image/svg+xml" />
  <script>
    (() => {
      const root = document.documentElement;
      const readStored = (key, allowed) => {
        try {
          const value = window.localStorage.getItem(key);
          return allowed.includes(value) ? value : "";
        } catch (_) {
          return "";
        }
      };
      const normalizeLocale = (value) => String(value || "").trim().replace(/_/g, "-").toLowerCase();
      const isChineseLocale = (value) => {
        const locale = normalizeLocale(value);
        return locale === "zh" || locale.startsWith("zh-") || locale.includes("-hans") || locale.includes("-hant");
      };

      const theme = readStored("loopora:theme", ["light", "dark"])
        || ((typeof window.matchMedia === "function" && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light");
      root.dataset.theme = theme;

      const savedLocale = readStored("loopora:locale", ["zh", "en"]);
      const localeCandidates = [];
      if (!savedLocale) {
        try {
          const intlLocale = Intl.DateTimeFormat().resolvedOptions().locale;
          if (intlLocale) {
            localeCandidates.push(intlLocale);
          }
        } catch (_) {
          // Ignore Intl availability issues during first-paint bootstrap.
        }
        if (Array.isArray(navigator.languages) && navigator.languages.length > 0) {
          localeCandidates.push(navigator.languages[0]);
        }
        localeCandidates.push(navigator.language, navigator.userLanguage, navigator.browserLanguage, navigator.systemLanguage);
      }
      const locale = savedLocale || (localeCandidates.some(isChineseLocale) ? "zh" : "en");
      root.dataset.locale = locale;
      root.lang = locale === "zh" ? "zh-CN" : "en";
    })();
  </script>
  <link rel="stylesheet" href="{{ static_asset_url('app.css') }}" />
  <script src="{{ static_asset_url('app.js') }}" defer></script>
</head>
<body>
  <div class="page-shell">
    <nav class="top-nav" data-testid="top-nav">
      <a class="top-nav-brand" href="/" aria-label="Loopora home" data-testid="nav-home-brand">
        <img class="top-nav-brand-lockup" src="/logo/logo-with-text-horizontal-light.svg" alt="" aria-hidden="true" />
      </a>
      <div class="top-nav-links">
        <a class="top-nav-link {% if request.url.path == '/' %}active{% endif %}" href="/" data-testid="nav-created-link">
          <span data-lang="zh">已创建</span>
          <span data-lang="en">Created</span>
        </a>
        <a class="top-nav-link {% if request.url.path.startswith('/roles') %}active{% endif %}" href="/roles" data-testid="nav-role-definitions-link">
          <span data-lang="zh">角色定义</span>
          <span data-lang="en">Roles</span>
        </a>
        <a class="top-nav-link {% if request.url.path.startswith('/orchestrations') %}active{% endif %}" href="/orchestrations" data-testid="nav-orchestrations-link">
          <span data-lang="zh">流程编排</span>
          <span data-lang="en">Orchestrations</span>
        </a>
        <a class="top-nav-link {% if request.url.path == '/loops/new' %}active{% endif %}" href="/loops/new" data-testid="nav-create-loop-link">
          <span data-lang="zh">创建循环</span>
          <span data-lang="en">Create Loop</span>
        </a>
        <a class="top-nav-link {% if request.url.path == '/tutorial' %}active{% endif %}" href="/tutorial" data-testid="nav-tutorial-link">
          <span data-lang="zh">使用教程</span>
          <span data-lang="en">Tutorial</span>
        </a>
        <a class="top-nav-link {% if request.url.path == '/tools' %}active{% endif %}" href="/tools" data-testid="nav-tools-link">
          <span data-lang="zh">工具</span>
          <span data-lang="en">Tools</span>
        </a>
      </div>
      <div class="top-nav-trailing">
        <div class="nav-preferences" data-testid="nav-preferences">
          <button
            class="ghost-button nav-preferences-toggle"
            type="button"
            id="nav-preferences-toggle"
            data-testid="nav-preferences-toggle"
            data-toggle-nav-preferences
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="nav-preferences-panel"
          >
            <span data-lang="zh">显示设置</span>
            <span data-lang="en">Display</span>
          </button>
          <div
            class="nav-preferences-panel"
            id="nav-preferences-panel"
            data-testid="nav-preferences-panel"
            data-nav-preferences-panel
            hidden
          >
            <section class="nav-preferences-section">
              <div class="nav-preferences-head">
                <strong><span data-lang="zh">主题</span><span data-lang="en">Theme</span></strong>
                <p><span data-lang="zh">切换浅色或深色界面。</span><span data-lang="en">Switch between light and dark appearance.</span></p>
              </div>
              <div class="locale-switch theme-switch" role="group" aria-label="Theme switch" data-testid="theme-switch">
                <button class="ghost-button locale-button theme-button" type="button" data-set-theme="light" aria-label="Light mode" data-testid="theme-light-button">☼ <span data-lang="zh">浅色</span><span data-lang="en">Light</span></button>
                <button class="ghost-button locale-button theme-button" type="button" data-set-theme="dark" aria-label="Dark mode" data-testid="theme-dark-button">☾ <span data-lang="zh">深色</span><span data-lang="en">Dark</span></button>
              </div>
            </section>
            <section class="nav-preferences-section">
              <div class="nav-preferences-head">
                <strong><span data-lang="zh">语言</span><span data-lang="en">Language</span></strong>
                <p><span data-lang="zh">切换界面文案语言。</span><span data-lang="en">Switch the interface language.</span></p>
              </div>
              <div class="locale-switch" role="group" aria-label="Language switch" data-testid="locale-switch">
                <button class="ghost-button locale-button" type="button" data-set-locale="zh">中文</button>
                <button class="ghost-button locale-button" type="button" data-set-locale="en">EN</button>
              </div>
            </section>
          </div>
        </div>
      </div>
    </nav>
    <main class="site-main">
      {% block content %}{% endblock %}
    </main>
  </div>
  <div class="confirm-modal" id="confirm-modal" hidden aria-hidden="true">
    <div class="confirm-modal-backdrop" data-close-confirm-modal="1"></div>
    <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title">
      <div class="confirm-modal-copy">
        <h2 id="confirm-modal-title">
          <span data-lang="zh">要删除这条 loop 吗？</span>
          <span data-lang="en">Delete this loop?</span>
        </h2>
        <p id="confirm-modal-detail"></p>
      </div>
      <div class="card-actions confirm-modal-actions">
        <button class="ghost-button" type="button" id="confirm-modal-cancel">
          <span data-lang="zh">先不删</span>
          <span data-lang="en">Keep it</span>
        </button>
        <button class="ghost-button danger-button" type="button" id="confirm-modal-confirm">
          <span data-lang="zh">确认删除</span>
          <span data-lang="en">Delete</span>
        </button>
      </div>
    </div>
  </div>
</body>
</html>
