<!doctype html>
<html lang="zh-CN" data-locale="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ run.loop_name or run.id }} · Console</title>
  <link rel="icon" href="/logo/logo.svg" sizes="any" type="image/svg+xml" />
  <link rel="shortcut icon" href="/logo/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="{{ static_asset_url('app.css') }}" />
  <script src="{{ static_asset_url('app.js') }}" defer></script>
  <script src="{{ static_asset_url('pages/run_console.js') }}" defer></script>
</head>
<body class="console-focus-body">
  <main class="console-focus-shell console-focus-shell--immersive">
    <div class="console-focus-topbar">
      <a class="secondary-button console-focus-back" href="/runs/{{ run.id }}">
        <span data-lang="zh">返回运行详情</span>
        <span data-lang="en">Back to run</span>
      </a>
    </div>
    <div class="console-shell console-shell-focus console-shell-immersive" id="console-focus-shell">
      <div class="console-output console-output-focus" id="console-focus-output"></div>
    </div>
  </main>

  <script>
    window.LooporaRunConsoleBootstrap = {
      runId: {{ run.id|tojson }},
      initialRun: {{ run|tojson }},
      initialConsoleEvents: {{ console_events|tojson }},
      latestEventId: {{ latest_event_id|tojson }},
    };
  </script>
</body>
</html>
