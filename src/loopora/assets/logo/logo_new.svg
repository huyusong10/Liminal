<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- V2: Soft Gradient - Thinner, more elegant -->
  <defs>
    <linearGradient id="v2-soft-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d66a36" />
      <stop offset="50%" stop-color="#c17a5e" />
      <stop offset="100%" stop-color="#0d7c66" />
    </linearGradient>
  </defs>

  <!-- Infinity loop scaled for transparent surfaces -->
  <path d="M 95 256 C 95 108, 242 108, 256 256 C 270 404, 417 404, 417 256 C 417 108, 270 108, 256 256 C 242 404, 95 404, 95 256 Z"
        fill="none"
        stroke="url(#v2-soft-grad)"
        stroke-width="32"
        stroke-linecap="round"
        stroke-linejoin="round" />

  <!-- Center dot with matching gradient -->
  <circle cx="256" cy="256" r="25" fill="#ffffff" stroke="url(#v2-soft-grad)" stroke-width="6" />
</svg>
