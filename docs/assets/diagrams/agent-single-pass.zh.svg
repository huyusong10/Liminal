<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">单轮 Agent 工作流看起来像一条射线</title>
  <desc id="desc">用户提出目标，Agent 执行任务并交回结果。真正困难的判断通常发生在结果之后。</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#dbe3ee" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" rx="28" fill="#f8fafc"/>
  <rect x="20" y="20" width="1160" height="520" rx="24" fill="url(#dots)" opacity="0.4"/>

  <text x="60" y="70" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#111827">单轮看起来像一条射线</text>
  <text x="60" y="102" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#475569">用户提出目标，Agent 执行，交回结果；判断通常发生在结果之后。</text>

  <g filter="url(#shadow)">
    <rect x="88" y="190" width="230" height="130" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
    <rect x="88" y="190" width="7" height="130" rx="3.5" fill="#d97706"/>
    <text x="203" y="248" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#111827">人类</text>
    <text x="203" y="282" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#475569">提出目标</text>
  </g>

  <path d="M338,255 L422,255" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="452" y="190" width="230" height="130" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
    <rect x="452" y="190" width="7" height="130" rx="3.5" fill="#4f46e5"/>
    <text x="567" y="248" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#111827">Agent</text>
    <text x="567" y="282" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#475569">执行任务</text>
  </g>

  <path d="M702,255 L786,255" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="816" y="190" width="230" height="130" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
    <rect x="816" y="190" width="7" height="130" rx="3.5" fill="#0d7c66"/>
    <text x="931" y="248" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#111827">结果</text>
    <text x="931" y="282" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#475569">看起来完成</text>
  </g>

  <text x="600" y="440" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#111827">真正困难的问题是：这个结果到底能不能信？</text>
</svg>
