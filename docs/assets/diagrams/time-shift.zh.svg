<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">从单轮射线到 human-shaped Loop</title>
  <desc id="desc">长期任务从单轮执行变成循环，Loopora 把人类判断提前放进运行结构。</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2c2118" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8d8378"/>
    </marker>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#e8dfd3" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" rx="28" fill="#faf9f6"/>
  <rect x="20" y="20" width="1160" height="520" rx="24" fill="url(#dots)" opacity="0.4"/>

  <text x="60" y="70" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="760" fill="#211b15">从单轮射线到 human-shaped Loop</text>
  <text x="60" y="102" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#6d665d">Loop 不是凭空出现的圈，而是长期任务复盘之后自然形成的工作流。</text>

  <!-- 第1行 -->
  <g filter="url(#shadow)">
    <rect x="60" y="136" width="1080" height="84" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
    <rect x="60" y="136" width="7" height="84" rx="3.5" fill="#4f46e5"/>
    <text x="96" y="170" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="760" fill="#211b15">1. 单轮看起来像射线</text>
    <text x="96" y="196" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#6d665d">用户提出目标，Agent 执行，然后交回结果。</text>
  </g>
  <rect x="520" y="156" width="120" height="36" rx="18" fill="#f8fafc" stroke="#d9d0c5"/>
  <text x="580" y="180" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#334155">人类目标</text>
  <path d="M652,174 L728,174" fill="none" stroke="#8d8378" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="744" y="156" width="120" height="36" rx="18" fill="#f8fafc" stroke="#d9d0c5"/>
  <text x="804" y="180" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#334155">Agent 执行</text>
  <path d="M876,174 L952,174" fill="none" stroke="#8d8378" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="968" y="156" width="100" height="36" rx="18" fill="#f8fafc" stroke="#d9d0c5"/>
  <text x="1018" y="180" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#334155">结果</text>

  <!-- 第2行 -->
  <g filter="url(#shadow)">
    <rect x="60" y="248" width="1080" height="84" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
    <rect x="60" y="248" width="7" height="84" rx="3.5" fill="#d97706"/>
    <text x="96" y="282" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="760" fill="#211b15">2. 一旦复盘，它就变成循环</text>
    <text x="96" y="308" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#6d665d">结果触发判断，判断又变成下一轮指令。</text>
  </g>
  <rect x="520" y="268" width="100" height="36" rx="18" fill="#f8fafc" stroke="#d9d0c5"/>
  <text x="570" y="292" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#334155">Agent</text>
  <path d="M632,286 L708,286" fill="none" stroke="#8d8378" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="724" y="268" width="90" height="36" rx="18" fill="#f8fafc" stroke="#d9d0c5"/>
  <text x="769" y="292" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#334155">结果</text>
  <path d="M826,286 L902,286" fill="none" stroke="#8d8378" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="918" y="268" width="110" height="36" rx="18" fill="#f8fafc" stroke="#d9d0c5"/>
  <text x="973" y="292" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#334155">人类判断</text>
  <path d="M973,316 C 900 350 650 350 570 316" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrow)"/>

  <!-- 第3行 -->
  <g filter="url(#shadow)">
    <rect x="60" y="360" width="1080" height="84" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
    <rect x="60" y="360" width="7" height="84" rx="3.5" fill="#0d7c66"/>
    <text x="96" y="394" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="760" fill="#211b15">3. Loopora 把判断提前放进结构</text>
    <text x="96" y="420" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#6d665d">人类判断先塑造 Loop 的运行方式。</text>
  </g>
  <rect x="520" y="380" width="120" height="36" rx="18" fill="#f8fafc" stroke="#d9d0c5"/>
  <text x="580" y="404" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#334155">人类判断</text>
  <path d="M652,398 L718,398" fill="none" stroke="#8d8378" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="734" y="380" width="110" height="36" rx="18" fill="#f8fafc" stroke="#d9d0c5"/>
  <text x="789" y="404" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#334155">Loopora</text>
  <path d="M856,398 L922,398" fill="none" stroke="#8d8378" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="938" y="380" width="120" height="36" rx="18" fill="#f8fafc" stroke="#d9d0c5"/>
  <text x="998" y="404" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#334155">治理 Loop</text>

  <text x="600" y="500" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="760" fill="#211b15">不是把人放在循环前面，而是让循环被人的判断塑造。</text>
</svg>
