<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">对齐让隐性判断成形</title>
  <desc id="desc">普通需求澄清只问要做什么，Loopora 对齐追问完成标准、可信证据和阻断风险，形成工作约定。</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2c2118" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8d8378"/>
    </marker>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#e8dfd3" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" rx="28" fill="#faf9f6"/>
  <rect x="20" y="20" width="1160" height="520" rx="24" fill="url(#dots)" opacity="0.4"/>

  <text x="60" y="70" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="760" fill="#211b15">对齐让隐性判断成形</text>
  <text x="60" y="102" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#6d665d">好的问题会显露用户未来本来会做的判断。</text>

  <!-- 普通需求澄清 -->
  <g filter="url(#shadow)">
    <rect x="60" y="150" width="300" height="260" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
    <rect x="60" y="150" width="7" height="260" rx="3.5" fill="#2563eb"/>
    <text x="92" y="200" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="760" fill="#211b15">普通需求澄清</text>
    <text x="92" y="254" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#6d665d">你要做什么？</text>
    <text x="92" y="290" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#6d665d">用什么技术？</text>
    <text x="92" y="326" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#6d665d">什么时候完成？</text>
  </g>

  <path d="M380,280 L440,280" fill="none" stroke="#8d8378" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="400" y="248" width="100" height="36" rx="18" fill="#f0edff" stroke="#806eff" stroke-opacity="0.35"/>
  <text x="450" y="272" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="760" fill="#806eff">判断成形</text>

  <!-- Loopora 对齐 -->
  <g filter="url(#shadow)">
    <rect x="470" y="140" width="320" height="280" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
    <rect x="470" y="140" width="7" height="280" rx="3.5" fill="#0d7c66"/>
    <text x="502" y="190" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="760" fill="#211b15">Loopora 对齐</text>
    <text x="502" y="244" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#6d665d">什么看起来完成但不能接受？</text>
    <text x="502" y="280" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#6d665d">什么证据最能说明问题？</text>
    <text x="502" y="316" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#6d665d">哪些风险必须阻断？</text>
    <text x="502" y="352" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#6d665d">两个方案都不完美时</text>
    <text x="502" y="378" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#6d665d">你会拒绝哪一个？</text>
  </g>

  <path d="M810,280 L870,280" fill="none" stroke="#8d8378" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- 工作约定 -->
  <g filter="url(#shadow)">
    <rect x="900" y="150" width="200" height="260" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
    <rect x="900" y="150" width="7" height="260" rx="3.5" fill="#d97706"/>
    <text x="932" y="200" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="760" fill="#211b15">工作约定</text>
    <text x="932" y="268" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#6d665d">完成标准</text>
    <text x="932" y="304" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#6d665d">可信证据</text>
    <text x="932" y="340" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#6d665d">阻断风险</text>
  </g>

  <text x="600" y="476" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="760" fill="#211b15">先形成工作约定，再编译成 Loop。</text>
</svg>
