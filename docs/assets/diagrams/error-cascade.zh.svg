<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">普通循环如何把早期误差包装得更像完成</title>
  <desc id="desc">早期误差被后续轮次继承，结果越来越完整，但真正风险没有进入循环。</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2c2118" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8d8378"/>
    </marker>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#e8dfd3" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" rx="28" fill="#faf9f6"/>
  <rect x="20" y="20" width="1160" height="520" rx="24" fill="url(#dots)" opacity="0.4"/>

  <text x="60" y="70" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="760" fill="#211b15">普通循环如何把早期误差包装得更像完成</text>
  <text x="60" y="102" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#6d665d">每一轮都看似在推进，但错误的完成标准会被继承进下一轮上下文。</text>

  <!-- 人类 -->
  <g filter="url(#shadow)">
    <rect x="72" y="150" width="210" height="120" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
    <rect x="72" y="150" width="7" height="120" rx="3.5" fill="#d97706"/>
    <text x="100" y="198" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="760" fill="#211b15">人类</text>
    <text x="100" y="228" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#6d665d">强调完成度</text>
    <text x="100" y="250" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#6d665d">但判断未进入结构</text>
  </g>

  <path d="M302,210 L366,210" fill="none" stroke="#8d8378" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- 第1轮 -->
  <g filter="url(#shadow)">
    <rect x="386" y="150" width="170" height="120" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
    <rect x="386" y="150" width="7" height="120" rx="3.5" fill="#b45309"/>
    <text x="414" y="198" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="760" fill="#211b15">第 1 轮</text>
    <text x="414" y="228" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#6d665d">页面能提交</text>
    <text x="414" y="250" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#6d665d">被当成核心完成</text>
  </g>

  <path d="M576,210 L640,210" fill="none" stroke="#8d8378" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- 第2轮 -->
  <g filter="url(#shadow)">
    <rect x="660" y="150" width="170" height="120" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
    <rect x="660" y="150" width="7" height="120" rx="3.5" fill="#b45309"/>
    <text x="688" y="198" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="760" fill="#211b15">第 2 轮</text>
    <text x="688" y="228" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#6d665d">界面更完整</text>
    <text x="688" y="250" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#6d665d">风险被 UI 掩盖</text>
  </g>

  <path d="M850,210 L914,210" fill="none" stroke="#8d8378" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- 第3轮 -->
  <g filter="url(#shadow)">
    <rect x="934" y="150" width="170" height="120" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
    <rect x="934" y="150" width="7" height="120" rx="3.5" fill="#b45309"/>
    <text x="962" y="198" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="760" fill="#211b15">第 3 轮</text>
    <text x="962" y="228" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#6d665d">测试更多</text>
    <text x="962" y="250" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#6d665d">仍围绕主路径</text>
  </g>

  <!-- 虚线连接 -->
  <path d="M460,300 C 560 350 720 350 900 300" fill="none" stroke="#d97706" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <rect x="580" y="320" width="200" height="28" rx="14" fill="#faf9f6"/>
  <text x="680" y="340" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#6d665d">上一轮误解变成下一轮上下文</text>

  <!-- 风险框 -->
  <g filter="url(#shadow)">
    <rect x="100" y="390" width="1000" height="80" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
    <rect x="100" y="390" width="7" height="80" rx="3.5" fill="#b45309"/>
    <text x="128" y="425" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="760" fill="#9a3412">真正应该被证明的东西没有进入循环</text>
    <text x="128" y="454" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#7c2d12">权限边界、核心业务路径、失败处理、重复动作、审计证据、人工接管</text>
  </g>

  <text x="600" y="510" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="760" fill="#211b15">多跑几轮不一定带来可靠结果，也可能让错误故事更完整。</text>
</svg>
