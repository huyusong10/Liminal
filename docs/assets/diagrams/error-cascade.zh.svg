<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">普通循环会让误差越来越自洽</title>
  <desc id="desc">早期误解会变成后续上下文。</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#2c2118" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8d8378"/>
    </marker>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.05" fill="#e8dfd3" opacity="0.72"/>
    </pattern>
  </defs>
  <rect width="1200" height="580" rx="28" fill="#fffdf8"/>
  <rect x="18" y="18" width="1164" height="544" rx="24" fill="url(#dots)" opacity="0.42"/>
  <text x="60" y="70.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="34" font-weight="820" fill="#211b15">普通循环会让误差越来越自洽</text>
  <text x="60" y="106.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="18" font-weight="520" fill="#6d665d">早期误解会变成后续上下文。</text>
<rect x="75" y="114" width="155" height="44" rx="22" fill="#fff1e9" stroke="#d66a36" stroke-opacity="0.35"/>
<text x="152.5" y="143.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="18" font-weight="760" fill="#d66a36">第 1 轮</text>
<g filter="url(#shadow)">
<rect x="75" y="170" width="165" height="95" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
<rect x="75" y="170" width="7" height="95" rx="3.5" fill="#d66a36"/>
<text x="103" y="212.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="23" font-weight="760" fill="#211b15">误解目标</text>
</g>
<path d="M240,218 L285,263" fill="none" stroke="#d66a36" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="295" y="159" width="155" height="44" rx="22" fill="#fff1e9" stroke="#d66a36" stroke-opacity="0.35"/>
<text x="372.5" y="188.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="18" font-weight="760" fill="#d66a36">第 2 轮</text>
<g filter="url(#shadow)">
<rect x="295" y="215" width="165" height="95" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
<rect x="295" y="215" width="7" height="95" rx="3.5" fill="#d66a36"/>
<text x="323" y="257.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="23" font-weight="760" fill="#211b15">优化误解</text>
</g>
<path d="M460,263 L505,308" fill="none" stroke="#d66a36" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="515" y="204" width="155" height="44" rx="22" fill="#fff6df" stroke="#a67027" stroke-opacity="0.35"/>
<text x="592.5" y="233.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="18" font-weight="760" fill="#a67027">第 3 轮</text>
<g filter="url(#shadow)">
<rect x="515" y="260" width="165" height="95" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
<rect x="515" y="260" width="7" height="95" rx="3.5" fill="#a67027"/>
<text x="543" y="302.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="23" font-weight="760" fill="#211b15">当作事实</text>
</g>
<path d="M680,308 L725,353" fill="none" stroke="#a67027" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="735" y="249" width="155" height="44" rx="22" fill="#f0edff" stroke="#806eff" stroke-opacity="0.35"/>
<text x="812.5" y="278.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="18" font-weight="760" fill="#806eff">第 4 轮</text>
<g filter="url(#shadow)">
<rect x="735" y="305" width="165" height="95" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
<rect x="735" y="305" width="7" height="95" rx="3.5" fill="#806eff"/>
<text x="763" y="347.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="23" font-weight="760" fill="#211b15">打磨方向</text>
</g>
<path d="M900,353 L945,398" fill="none" stroke="#806eff" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="955" y="294" width="155" height="44" rx="22" fill="#fff0ec" stroke="#b84a37" stroke-opacity="0.35"/>
<text x="1032.5" y="323.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="18" font-weight="760" fill="#b84a37">最终</text>
<g filter="url(#shadow)">
<rect x="955" y="350" width="165" height="95" rx="18" fill="#ffffff" stroke="#d9d0c5"/>
<rect x="955" y="350" width="7" height="95" rx="3.5" fill="#b84a37"/>
<text x="983" y="392.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="23" font-weight="760" fill="#211b15">自洽但偏离</text>
</g>
<text x="600" y="505.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="28" font-weight="820" fill="#b84a37">更多轮次可能只是让错误故事更完整。</text>
</svg>
