<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">长期 Agent 任务自然变成复盘循环</title>
  <desc id="desc">Agent 交回结果，人类判断结果，再把判断变成下一轮指令，形成循环。</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#dbe3ee" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" rx="28" fill="#f8fafc"/>
  <rect x="20" y="20" width="1160" height="520" rx="24" fill="url(#dots)" opacity="0.4"/>

  <text x="60" y="70" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#111827">长期任务会自然变成循环</text>
  <text x="60" y="102" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" fill="#475569">第一次复盘之后，结果会触发判断，判断又会变成下一轮指令。</text>

  <g filter="url(#shadow)">
    <rect x="72" y="180" width="170" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
    <rect x="72" y="180" width="7" height="120" rx="3.5" fill="#4f46e5"/>
    <text x="157" y="230" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#111827">Agent</text>
    <text x="157" y="260" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#475569">继续执行</text>
  </g>

  <path d="M262,240 L346,240" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="304" y="228" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#475569">交回</text>

  <g filter="url(#shadow)">
    <rect x="366" y="180" width="170" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
    <rect x="366" y="180" width="7" height="120" rx="3.5" fill="#0d7c66"/>
    <text x="451" y="230" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#111827">结果</text>
    <text x="451" y="260" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#475569">证据与解释</text>
  </g>

  <path d="M556,240 L640,240" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="598" y="228" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#475569">复盘</text>

  <g filter="url(#shadow)">
    <rect x="660" y="180" width="200" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
    <rect x="660" y="180" width="7" height="120" rx="3.5" fill="#d97706"/>
    <text x="760" y="230" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#111827">人类判断</text>
    <text x="760" y="260" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#475569">接收 / 拒绝 / 追问</text>
  </g>

  <path d="M760,320 L760,374 L500,374" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="680" y="362" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600" fill="#475569">形成下一轮</text>

  <g filter="url(#shadow)">
    <rect x="280" y="350" width="220" height="90" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
    <rect x="280" y="350" width="7" height="90" rx="3.5" fill="#64748b"/>
    <text x="390" y="390" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#111827">下一轮指令</text>
    <text x="390" y="416" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#475569">继续 / 收窄 / 停止</text>
  </g>

  <path d="M280,395 C 180 394 120 350 110 300" fill="none" stroke="#d97706" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrow)"/>

  <text x="600" y="490" text-anchor="middle" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#111827">Loop 不是人为添加的；任务复盘后，它已经在发生。</text>
</svg>
