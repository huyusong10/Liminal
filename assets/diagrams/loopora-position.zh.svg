<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Loopora 在长期 Agent 任务中的位置</title>
  <desc id="desc">图示 Loopora 不把人的判断写成更长文档，而是把判断放到 Agent 外部的运行结构中，让每轮工作被证据回流重新约束。</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
    <style>
      .canvas { fill: #f8fafc; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #172033; }
      .sub { font-family: Inter, Arial, sans-serif; font-size: 17px; font-weight: 400; fill: #5b6475; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .focus { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; }
      .round { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; }
      .h { font-family: Inter, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #172033; }
      .body { font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 400; fill: #475569; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #1e3a8a; }
      .green { fill: #065f46; }
      .shadow { filter: drop-shadow(0 10px 18px rgb(15 23 42 / 0.10)); }
    </style>
  </defs>

  <rect width="1000" height="560" rx="28" class="canvas"/>
  <text x="500" y="58" text-anchor="middle" class="title">不是更长的 PRD，而是外部运行结构</text>
  <text x="500" y="91" text-anchor="middle" class="sub">省掉的是重复施加同类判断，不是判断本身</text>

  <g class="shadow">
    <rect x="74" y="150" width="230" height="230" rx="18" class="card"/>
    <text x="114" y="196" class="h">人的判断</text>
    <circle cx="102" cy="229" r="5" fill="#2563eb"/>
    <text x="120" y="234" class="body">什么不算完成</text>
    <circle cx="102" cy="266" r="5" fill="#059669"/>
    <text x="120" y="271" class="body">什么证据可信</text>
    <circle cx="102" cy="303" r="5" fill="#dc2626"/>
    <text x="120" y="308" class="body">哪些风险阻断</text>
    <circle cx="102" cy="340" r="5" fill="#2563eb"/>
    <text x="120" y="345" class="body">什么时候收尾</text>
  </g>

  <path d="M320 265 H376" fill="none" stroke="#2563eb" stroke-width="3"/>
  <polygon points="390,265 374,256 374,274" fill="#2563eb"/>

  <g class="shadow">
    <rect x="400" y="118" width="240" height="294" rx="22" class="focus"/>
    <text x="520" y="166" text-anchor="middle" class="h">Loopora 运行结构</text>
    <text x="520" y="194" text-anchor="middle" class="body">放在 Agent 外部</text>
    <rect x="440" y="228" width="160" height="34" rx="17" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="520" y="250" text-anchor="middle" class="label">任务契约</text>
    <rect x="440" y="276" width="160" height="34" rx="17" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="520" y="298" text-anchor="middle" class="label">证据路径</text>
    <rect x="440" y="324" width="160" height="34" rx="17" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="520" y="346" text-anchor="middle" class="label">裁决规则</text>
  </g>

  <path d="M656 265 H694" fill="none" stroke="#2563eb" stroke-width="3"/>
  <polygon points="708,265 692,256 692,274" fill="#2563eb"/>

  <g class="shadow">
    <rect x="718" y="150" width="208" height="230" rx="18" class="card"/>
    <text x="822" y="196" text-anchor="middle" class="h">Agent 多轮工作</text>
    <rect x="752" y="228" width="140" height="34" rx="17" class="round"/>
    <text x="822" y="250" text-anchor="middle" class="label green">行动 + 证据</text>
    <rect x="752" y="276" width="140" height="34" rx="17" class="round"/>
    <text x="822" y="298" text-anchor="middle" class="label green">补关键缺口</text>
    <rect x="752" y="324" width="140" height="34" rx="17" class="round"/>
    <text x="822" y="346" text-anchor="middle" class="label green">形成裁决</text>
  </g>

  <path d="M822 400 C786 472 610 470 556 432" fill="none" stroke="#059669" stroke-width="3"/>
  <polygon points="544,424 562,424 552,440" fill="#059669"/>
  <text x="690" y="472" text-anchor="middle" class="label green">证据回流，下一轮重新受约束</text>

  <text x="500" y="520" text-anchor="middle" class="body">长期任务不是只回到 Agent 的自我总结，而是持续回到同一组判断和证据。</text>
</svg>
