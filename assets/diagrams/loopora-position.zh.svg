<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Loopora 在长期 Agent 任务中的位置</title>
  <desc id="desc">图示人类判断先被整理成 Agent 外部的运行结构，随后每轮 Agent 工作都带着证据回到这些判断上。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#d97706"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1000" height="620" rx="28" fill="#f6f8fb"/>
  <text x="500" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">不是更长的 PRD，而是 Agent 外部的运行结构</text>
  <text x="500" y="93" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#5b6475">省掉的是重复应用同类判断，不是判断本身</text>

  <rect x="54" y="150" width="246" height="260" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <circle cx="96" cy="195" r="24" fill="#dbeafe"/>
  <text x="96" y="203" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#2563eb">人</text>
  <text x="132" y="192" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">人类判断</text>
  <text x="82" y="245" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">拒绝什么</text>
  <text x="82" y="286" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">相信什么证据</text>
  <text x="82" y="327" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">哪些风险阻断</text>
  <text x="82" y="368" font-family="Inter, Arial, sans-serif" font-size="17" fill="#334155">什么时候收口</text>
  <circle cx="66" cy="239" r="5" fill="#2563eb"/>
  <circle cx="66" cy="280" r="5" fill="#2563eb"/>
  <circle cx="66" cy="321" r="5" fill="#dc2626"/>
  <circle cx="66" cy="362" r="5" fill="#059669"/>

  <rect x="378" y="128" width="244" height="304" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="500" y="176" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#172033">Loopora 运行结构</text>
  <text x="500" y="209" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">放在 Agent 外面</text>
  <rect x="414" y="245" width="172" height="36" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="500" y="269" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#1e3a8a">任务契约</text>
  <rect x="414" y="296" width="172" height="36" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="500" y="320" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#1e3a8a">证据路径</text>
  <rect x="414" y="347" width="172" height="36" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="500" y="371" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#1e3a8a">裁决规则</text>

  <rect x="700" y="150" width="246" height="260" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="823" y="192" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">Agent 多轮工作</text>
  <rect x="728" y="232" width="190" height="44" rx="12" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="823" y="260" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#065f46">第 1 轮：行动 + 证据</text>
  <rect x="728" y="293" width="190" height="44" rx="12" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="823" y="321" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#065f46">第 2 轮：补缺口</text>
  <rect x="728" y="354" width="190" height="44" rx="12" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="823" y="382" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#065f46">第 N 轮：可裁决</text>

  <path d="M306 280 C332 280 348 280 372 280" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M628 280 C654 280 670 280 694 280" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M823 432 C820 504 634 516 526 450" fill="none" stroke="#d97706" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow-orange)"/>
  <text x="700" y="515" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#9a3412">证据回流，下一轮被重新约束</text>

  <rect x="202" y="535" width="596" height="58" rx="18" fill="#172033"/>
  <text x="500" y="570" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">让多轮任务持续回到人的判断，而不是只回到 Agent 的自我总结</text>
</svg>
