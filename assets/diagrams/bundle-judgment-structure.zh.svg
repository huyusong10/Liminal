<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc">
  <title id="title">方案文件如何表达判断力</title>
  <desc id="desc">图示 Loopora 方案文件通过任务契约、Agent 责任、运行流程、证据规则和裁决规则覆盖长期任务中最容易漂移的判断面。</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1000" height="720" rx="28" fill="#f6f8fb"/>
  <text x="500" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">方案文件如何承载任务局部判断</text>
  <text x="500" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#5b6475">不是模拟人的全部智慧，而是覆盖每轮最容易漂移的判断面</text>

  <rect x="58" y="126" width="884" height="492" rx="24" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <rect x="104" y="154" width="792" height="64" rx="18" fill="#172033"/>
  <text x="500" y="184" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Loopora 方案文件</text>
  <text x="500" y="207" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14.5" fill="#dbeafe">一份可审查、可运行、可复用的任务判断结构</text>

  <rect x="98" y="252" width="220" height="42" rx="14" fill="#dbeafe" stroke="#bfdbfe"/>
  <text x="208" y="278" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">方案文件面</text>
  <rect x="350" y="252" width="226" height="42" rx="14" fill="#dbeafe" stroke="#bfdbfe"/>
  <text x="463" y="278" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">防止什么漂移</text>
  <rect x="608" y="252" width="294" height="42" rx="14" fill="#dbeafe" stroke="#bfdbfe"/>
  <text x="755" y="278" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">每轮回到的问题</text>

  <rect x="98" y="314" width="804" height="54" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <circle cx="122" cy="341" r="12" fill="#2563eb"/>
  <text x="122" y="346" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">1</text>
  <text x="154" y="347" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">任务契约</text>
  <text x="368" y="347" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#475569">目标被悄悄缩小</text>
  <text x="626" y="347" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#475569">什么结果不算完成？</text>

  <rect x="98" y="382" width="804" height="54" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <circle cx="122" cy="409" r="12" fill="#2563eb"/>
  <text x="122" y="414" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">2</text>
  <text x="154" y="415" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">Agent 责任</text>
  <text x="368" y="415" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#475569">只做容易的部分</text>
  <text x="626" y="415" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#475569">这一轮该关注和避免什么？</text>

  <rect x="98" y="450" width="804" height="54" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <circle cx="122" cy="477" r="12" fill="#2563eb"/>
  <text x="122" y="482" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">3</text>
  <text x="154" y="483" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">运行流程</text>
  <text x="368" y="483" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#475569">证据不足还继续美化</text>
  <text x="626" y="483" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#475569">下一轮回到哪个缺口？</text>

  <rect x="98" y="518" width="804" height="54" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <circle cx="122" cy="545" r="12" fill="#059669"/>
  <text x="122" y="550" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">4</text>
  <text x="154" y="551" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">证据规则</text>
  <text x="368" y="551" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#475569">用自述替代证明</text>
  <text x="626" y="551" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#475569">什么证据值得相信？</text>

  <rect x="98" y="586" width="804" height="54" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <circle cx="122" cy="613" r="12" fill="#dc2626"/>
  <text x="122" y="618" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">5</text>
  <text x="154" y="619" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">裁决规则</text>
  <text x="368" y="619" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#475569">把看起来完成当完成</text>
  <text x="626" y="619" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#475569">通过、阻断、继续还是留风险？</text>

  <rect x="150" y="654" width="700" height="52" rx="20" fill="#172033"/>
  <text x="500" y="676" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#ffffff">充分性来自反复应用：</text>
  <text x="500" y="697" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#ffffff">每轮产物都必须回到同一组判断面，而不是只回到 Agent 的总结</text>
</svg>
