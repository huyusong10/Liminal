<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">普通自动循环如何继承早期误差</title>
  <desc id="desc">图示没有稳定判断结构时，多轮 Agent 工作会沿着更容易完成的代理目标持续推进，而授权、资格、支付失败和审计等真实交付门禁停在循环外。</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1000" height="620" rx="28" fill="#f8fafc"/>
  <text x="500" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">没有稳定判断结构时，循环会继承早期误差</text>
  <text x="500" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="400" fill="#5b6475">多轮看似在推进，但推进的是更容易完成的代理目标</text>

  <text x="500" y="138" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#2563eb">被循环继承的代理目标</text>

  <g filter="url(#shadow)">
    <rect x="70" y="158" width="178" height="168" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="159" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#172033">第 1 轮</text>
    <rect x="104" y="228" width="110" height="34" rx="17" fill="#dbeafe"/>
    <text x="159" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#1e3a8a">页面能提交</text>
    <text x="159" y="291" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748b">被当成完成信号</text>
  </g>

  <path d="M264 242 H304" stroke="#2563eb" stroke-width="3" fill="none"/>
  <polygon points="318,242 302,233 302,251" fill="#2563eb"/>

  <g filter="url(#shadow)">
    <rect x="330" y="158" width="178" height="168" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="419" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#172033">第 2 轮</text>
    <rect x="362" y="228" width="114" height="34" rx="17" fill="#dbeafe"/>
    <text x="419" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#1e3a8a">外壳更完整</text>
    <text x="419" y="291" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748b">状态、文案增加</text>
  </g>

  <path d="M524 242 H564" stroke="#2563eb" stroke-width="3" fill="none"/>
  <polygon points="578,242 562,233 562,251" fill="#2563eb"/>

  <g filter="url(#shadow)">
    <rect x="590" y="158" width="178" height="168" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="679" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#172033">第 3 轮</text>
    <rect x="622" y="228" width="114" height="34" rx="17" fill="#dbeafe"/>
    <text x="679" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#1e3a8a">易证路径更多</text>
    <text x="679" y="291" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748b">主路径越来越顺</text>
  </g>

  <path d="M784 242 H824" stroke="#2563eb" stroke-width="3" fill="none"/>
  <polygon points="838,242 822,233 822,251" fill="#2563eb"/>

  <g filter="url(#shadow)">
    <rect x="850" y="158" width="110" height="168" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
    <text x="905" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#172033">第 4 轮</text>
    <rect x="873" y="228" width="64" height="34" rx="17" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="905" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#1e3a8a">完成</text>
    <text x="905" y="291" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748b">更自信</text>
  </g>

  <line x1="220" y1="374" x2="388" y2="374" stroke="#fed7aa" stroke-width="2"/>
  <line x1="612" y1="374" x2="780" y2="374" stroke="#fed7aa" stroke-width="2"/>
  <text x="500" y="379" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#9a3412">真实判断没有被带回每轮判断</text>

  <g filter="url(#shadow)">
    <rect x="118" y="420" width="764" height="110" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="500" y="455" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#172033">真实交付门禁停在循环外</text>
    <rect x="156" y="484" width="158" height="32" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="235" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#9a3412">授权路径未证明</text>
    <rect x="338" y="484" width="158" height="32" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="417" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#9a3412">资格边界未证明</text>
    <rect x="520" y="484" width="158" height="32" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="599" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#9a3412">支付失败未证明</text>
    <rect x="702" y="484" width="120" height="32" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="762" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#9a3412">审计缺失</text>
  </g>

  <text x="500" y="580" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#172033">Human-shaped Loop 要改变的，是让每轮回到真实判断，而不是只继承更容易完成的目标</text>
</svg>
