<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">普通自动循环如何放大早期误差</title>
  <desc id="desc">图示无治理的多轮循环把页面能提交这样的代理目标逐轮包装成更完整的完成故事，而核心风险仍未被证明。</desc>
  <defs>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1000" height="620" rx="28" fill="#f6f8fb"/>
  <text x="500" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">没有稳定裁决时，多轮会把早期误差加工得更像完成</text>
  <text x="500" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#5b6475">问题不是 Agent 不努力，而是它继承了错误的完成定义</text>

  <rect x="76" y="150" width="196" height="180" rx="18" fill="#ffffff" stroke="#fecaca" filter="url(#shadow)"/>
  <text x="174" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#991b1b">第 1 轮</text>
  <text x="174" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="600" fill="#172033">页面能提交</text>
  <text x="174" y="263" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">被当成完成信号</text>
  <rect x="109" y="286" width="130" height="28" rx="14" fill="#fee2e2"/>
  <text x="174" y="306" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#991b1b">代理目标偏了</text>

  <rect x="304" y="150" width="196" height="180" rx="18" fill="#ffffff" stroke="#fecaca" filter="url(#shadow)"/>
  <text x="402" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#991b1b">第 2 轮</text>
  <text x="402" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="600" fill="#172033">继续打磨 UI</text>
  <text x="402" y="263" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">状态更多，文案更全</text>
  <rect x="337" y="286" width="130" height="28" rx="14" fill="#fee2e2"/>
  <text x="402" y="306" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#991b1b">风险未减少</text>

  <rect x="532" y="150" width="196" height="180" rx="18" fill="#ffffff" stroke="#fecaca" filter="url(#shadow)"/>
  <text x="630" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#991b1b">第 3 轮</text>
  <text x="630" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="600" fill="#172033">补容易过的测试</text>
  <text x="630" y="263" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">主路径越来越顺</text>
  <rect x="565" y="286" width="130" height="28" rx="14" fill="#fee2e2"/>
  <text x="630" y="306" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#991b1b">证据仍偏软</text>

  <rect x="760" y="150" width="166" height="180" rx="18" fill="#fff7ed" stroke="#fb923c" filter="url(#shadow)"/>
  <text x="843" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#9a3412">第 4 轮</text>
  <text x="843" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="600" fill="#172033">完成故事</text>
  <text x="843" y="263" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">更完整，更自信</text>
  <rect x="786" y="286" width="114" height="28" rx="14" fill="#fed7aa"/>
  <text x="843" y="306" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#9a3412">更像交付</text>

  <path d="M278 240 L298 240" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
  <path d="M506 240 L526 240" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
  <path d="M734 240 L754 240" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>

  <rect x="92" y="404" width="816" height="116" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="500" y="438" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">真实风险没有被拉回循环</text>
  <rect x="136" y="466" width="176" height="34" rx="17" fill="#fef2f2" stroke="#fecaca"/>
  <text x="224" y="489" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#991b1b">授权路径未证明</text>
  <rect x="338" y="466" width="176" height="34" rx="17" fill="#fef2f2" stroke="#fecaca"/>
  <text x="426" y="489" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#991b1b">资格边界未证明</text>
  <rect x="540" y="466" width="176" height="34" rx="17" fill="#fef2f2" stroke="#fecaca"/>
  <text x="628" y="489" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#991b1b">支付失败未证明</text>
  <rect x="742" y="466" width="122" height="34" rx="17" fill="#fef2f2" stroke="#fecaca"/>
  <text x="803" y="489" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#991b1b">审计缺失</text>

  <path d="M500 356 L500 392" stroke="#2563eb" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#arrow-blue)"/>
  <text x="500" y="566" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#172033">Human-shaped Loop 要控制的，正是这种误差继承和假完成收束</text>
</svg>
