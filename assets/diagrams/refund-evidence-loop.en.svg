<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc">
  <title id="title">Evidence-driven loop for the refund task</title>
  <desc id="desc">The diagram shows the refund task moving from first-round output to evidence accounting, decision, and a narrowed next round instead of free-form polishing.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1000" height="720" rx="28" fill="#f6f8fb"/>
  <text x="500" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">The refund task: the next round follows evidence gaps</text>
  <text x="500" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#5b6475">The run returns to human judgment instead of making the page feel more complete</text>

  <rect x="56" y="152" width="244" height="174" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="178" y="192" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#172033">First-round output</text>
  <text x="84" y="236" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">page and form submit</text>
  <text x="84" y="273" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">eligibility is still mocked</text>
  <text x="84" y="310" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">happy-path tests pass</text>
  <circle cx="70" cy="230" r="5" fill="#059669"/>
  <circle cx="70" cy="267" r="5" fill="#d97706"/>
  <circle cx="70" cy="304" r="5" fill="#059669"/>

  <rect x="378" y="126" width="244" height="226" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="500" y="168" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#172033">Evidence accounting</text>
  <text x="406" y="213" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#1e3a8a">What did it prove?</text>
  <text x="406" y="247" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#1e3a8a">Which proof is weak?</text>
  <text x="406" y="281" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#1e3a8a">Which risks are unproven?</text>
  <text x="406" y="315" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#1e3a8a">Does anything block closure?</text>
  <circle cx="393" cy="207" r="4.5" fill="#2563eb"/>
  <circle cx="393" cy="241" r="4.5" fill="#2563eb"/>
  <circle cx="393" cy="275" r="4.5" fill="#2563eb"/>
  <circle cx="393" cy="309" r="4.5" fill="#dc2626"/>

  <rect x="700" y="152" width="244" height="174" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="822" y="192" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#172033">Decision</text>
  <rect x="726" y="224" width="192" height="34" rx="17" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="822" y="247" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#065f46">proven: page path</text>
  <rect x="726" y="270" width="192" height="34" rx="17" fill="#fef2f2" stroke="#fecaca"/>
  <text x="822" y="293" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#991b1b">blocks: auth unproven</text>

  <rect x="150" y="440" width="700" height="152" rx="20" fill="#172033" filter="url(#shadow)"/>
  <text x="500" y="482" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">The next round narrows</text>
  <rect x="182" y="520" width="152" height="38" rx="19" fill="#dbeafe"/>
  <text x="258" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">prove authorization</text>
  <rect x="354" y="520" width="146" height="38" rx="19" fill="#dbeafe"/>
  <text x="427" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">cover eligibility</text>
  <rect x="520" y="520" width="146" height="38" rx="19" fill="#dbeafe"/>
  <text x="593" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">add failure path</text>
  <rect x="686" y="520" width="132" height="38" rx="19" fill="#dbeafe"/>
  <text x="752" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">add audit trail</text>

  <path d="M306 239 C336 239 346 239 372 239" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M628 239 C658 239 668 239 694 239" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M822 336 C822 390 720 420 634 438" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M366 438 C280 420 178 392 178 338" stroke="#2563eb" stroke-width="3" stroke-dasharray="8 7" fill="none" marker-end="url(#arrow)"/>
  <text x="500" y="650" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#172033">The key question becomes: what is proven, what blocks, and what must be fixed next?</text>
</svg>
