<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Loopora overview</title>
  <desc id="desc">A diagram showing how Loopora turns a long-running objective and human task judgment into a reviewable Loop, so Agent rounds keep returning to evidence, gaps, blockers, and the task verdict.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
    <style>
      .canvas { fill: #f8fafc; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #172033; }
      .sub { font-family: Inter, Arial, sans-serif; font-size: 17px; font-weight: 400; fill: #5b6475; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .focus { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; }
      .web { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; }
      .h { font-family: Inter, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #172033; }
      .body { font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 400; fill: #475569; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #1e3a8a; }
      .green { fill: #065f46; }
      .shadow { filter: drop-shadow(0 10px 18px rgb(15 23 42 / 0.10)); }
    </style>
  </defs>

  <rect width="1000" height="560" rx="28" class="canvas"/>
  <text x="500" y="58" text-anchor="middle" class="title">Add judgment structure to long-running goals</text>
  <text x="500" y="91" text-anchor="middle" class="sub">The work keeps moving, while evidence, gaps, blockers, and verdict stay visible</text>

  <g class="shadow">
    <rect x="70" y="154" width="220" height="196" rx="18" class="card"/>
    <text x="100" y="198" class="h">Long goal</text>
    <text x="100" y="231" class="body">Continue like `/goal`</text>
    <line x1="100" y1="256" x2="260" y2="256" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="108" cy="287" r="5" fill="#2563eb"/>
    <text x="124" y="292" class="body">what counts as done</text>
    <circle cx="108" cy="318" r="5" fill="#dc2626"/>
    <text x="124" y="323" class="body">what must block</text>
  </g>

  <path d="M310 252 H366" fill="none" stroke="#2563eb" stroke-width="3"/>
  <polygon points="380,252 364,243 364,261" fill="#2563eb"/>

  <g class="shadow">
    <rect x="390" y="120" width="250" height="264" rx="22" class="focus"/>
    <text x="515" y="166" text-anchor="middle" class="h">Loopora Loop</text>
    <text x="515" y="194" text-anchor="middle" class="body">Reviewable run plan</text>
    <rect x="430" y="226" width="170" height="34" rx="17" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="515" y="248" text-anchor="middle" class="label">done criteria</text>
    <rect x="430" y="274" width="170" height="34" rx="17" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="515" y="296" text-anchor="middle" class="label">evidence rules</text>
    <rect x="430" y="322" width="170" height="34" rx="17" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="515" y="344" text-anchor="middle" class="label">verdict rules</text>
  </g>

  <path d="M660 252 H716" fill="none" stroke="#2563eb" stroke-width="3"/>
  <polygon points="730,252 714,243 714,261" fill="#2563eb"/>

  <g class="shadow">
    <rect x="740" y="154" width="190" height="196" rx="18" class="card"/>
    <text x="835" y="198" text-anchor="middle" class="h">Agent rounds</text>
    <rect x="775" y="222" width="120" height="32" rx="16" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="835" y="243" text-anchor="middle" class="label green">work</text>
    <rect x="775" y="268" width="120" height="32" rx="16" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="835" y="289" text-anchor="middle" class="label green">collect proof</text>
    <rect x="775" y="314" width="120" height="32" rx="16" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="835" y="335" text-anchor="middle" class="label green">return to gaps</text>
  </g>

  <g class="shadow">
    <rect x="170" y="432" width="660" height="78" rx="18" class="web"/>
    <text x="500" y="465" text-anchor="middle" class="h">Web reads the same local record</text>
    <text x="500" y="493" text-anchor="middle" class="body">Review Loops, inspect evidence, find gaps, see blockers and task verdicts</text>
  </g>

  <path d="M835 372 C835 420 740 438 654 438" fill="none" stroke="#059669" stroke-width="3"/>
  <polygon points="640,438 656,429 656,447" fill="#059669"/>
  <path d="M515 398 V421" fill="none" stroke="#059669" stroke-width="3"/>
  <polygon points="515,435 506,419 524,419" fill="#059669"/>
</svg>
