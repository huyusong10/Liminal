<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc">
  <title id="title">退款任务中的证据驱动循环</title>
  <desc id="desc">图示同一个退款任务在 Loopora 中如何从第一轮产物进入证据对账、裁决和下一轮焦点，而不是继续自由打磨。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1000" height="720" rx="28" fill="#f6f8fb"/>
  <text x="500" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">同一个退款任务：下一轮被证据缺口牵引</text>
  <text x="500" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#5b6475">不是继续做“更完整”的页面，而是回到人的判断标准</text>

  <rect x="56" y="152" width="244" height="174" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="178" y="192" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#172033">第一轮产物</text>
  <text x="84" y="236" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">页面和表单可提交</text>
  <text x="84" y="273" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">资格判断仍是模拟规则</text>
  <text x="84" y="310" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">主路径测试通过</text>
  <circle cx="70" cy="230" r="5" fill="#059669"/>
  <circle cx="70" cy="267" r="5" fill="#d97706"/>
  <circle cx="70" cy="304" r="5" fill="#059669"/>

  <rect x="378" y="126" width="244" height="226" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="500" y="168" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#172033">证据对账</text>
  <text x="406" y="213" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#1e3a8a">它证明了什么？</text>
  <text x="406" y="247" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#1e3a8a">哪些只是弱证据？</text>
  <text x="406" y="281" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#1e3a8a">哪些风险还没证明？</text>
  <text x="406" y="315" font-family="Inter, Arial, sans-serif" font-size="15.5" fill="#1e3a8a">有没有必须阻断的问题？</text>
  <circle cx="393" cy="207" r="4.5" fill="#2563eb"/>
  <circle cx="393" cy="241" r="4.5" fill="#2563eb"/>
  <circle cx="393" cy="275" r="4.5" fill="#2563eb"/>
  <circle cx="393" cy="309" r="4.5" fill="#dc2626"/>

  <rect x="700" y="152" width="244" height="174" rx="18" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="822" y="192" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#172033">裁决</text>
  <rect x="726" y="224" width="192" height="34" rx="17" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="822" y="247" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#065f46">已证明：页面主路径</text>
  <rect x="726" y="270" width="192" height="34" rx="17" fill="#fef2f2" stroke="#fecaca"/>
  <text x="822" y="293" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#991b1b">阻断：越权未证明</text>

  <rect x="150" y="440" width="700" height="152" rx="20" fill="#172033" filter="url(#shadow)"/>
  <text x="500" y="482" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">下一轮焦点被收窄</text>
  <rect x="188" y="520" width="146" height="38" rx="19" fill="#dbeafe"/>
  <text x="261" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">先补权限证明</text>
  <rect x="354" y="520" width="146" height="38" rx="19" fill="#dbeafe"/>
  <text x="427" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">补资格边界</text>
  <rect x="520" y="520" width="146" height="38" rx="19" fill="#dbeafe"/>
  <text x="593" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">补失败路径</text>
  <rect x="686" y="520" width="126" height="38" rx="19" fill="#dbeafe"/>
  <text x="749" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">补审计链路</text>

  <path d="M306 239 C336 239 346 239 372 239" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M628 239 C658 239 668 239 694 239" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M822 336 C822 390 720 420 634 438" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M366 438 C280 420 178 392 178 338" stroke="#2563eb" stroke-width="3" stroke-dasharray="8 7" fill="none" marker-end="url(#arrow)"/>
  <text x="500" y="650" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#172033">结果不是“Agent 觉得更完整”，而是“哪些证据足够、哪些缺口阻断、下一轮补哪里”</text>
</svg>
