<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">How Plain Automated Loops Inherit Early Error</title>
  <desc id="desc">The diagram shows that without stable judgment structure, multiple Agent rounds keep advancing an easier proxy goal while authorization, eligibility, provider failure, and audit gates remain outside the loop.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1000" height="620" rx="28" fill="#f8fafc"/>
  <text x="500" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">Without stable judgment, loops inherit early error</text>
  <text x="500" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="400" fill="#5b6475">Rounds appear to move forward, but they advance the easier proxy goal</text>

  <text x="500" y="138" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#2563eb">Proxy goal inherited by the loop</text>

  <g filter="url(#shadow)">
    <rect x="70" y="158" width="178" height="168" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="159" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#172033">Round 1</text>
    <rect x="104" y="228" width="110" height="34" rx="17" fill="#dbeafe"/>
    <text x="159" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#1e3a8a">Page submits</text>
    <text x="159" y="291" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748b">Taken as done</text>
  </g>

  <path d="M264 242 H304" stroke="#2563eb" stroke-width="3" fill="none"/>
  <polygon points="318,242 302,233 302,251" fill="#2563eb"/>

  <g filter="url(#shadow)">
    <rect x="330" y="158" width="178" height="168" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="419" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#172033">Round 2</text>
    <rect x="362" y="228" width="114" height="34" rx="17" fill="#dbeafe"/>
    <text x="419" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#1e3a8a">Shell improves</text>
    <text x="419" y="291" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748b">More states and copy</text>
  </g>

  <path d="M524 242 H564" stroke="#2563eb" stroke-width="3" fill="none"/>
  <polygon points="578,242 562,233 562,251" fill="#2563eb"/>

  <g filter="url(#shadow)">
    <rect x="590" y="158" width="178" height="168" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="679" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#172033">Round 3</text>
    <rect x="611" y="228" width="136" height="34" rx="17" fill="#dbeafe"/>
    <text x="679" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#1e3a8a">Easy proofs grow</text>
    <text x="679" y="291" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748b">Main path gets smoother</text>
  </g>

  <path d="M784 242 H824" stroke="#2563eb" stroke-width="3" fill="none"/>
  <polygon points="838,242 822,233 822,251" fill="#2563eb"/>

  <g filter="url(#shadow)">
    <rect x="850" y="158" width="110" height="168" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
    <text x="905" y="200" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#172033">Round 4</text>
    <rect x="873" y="228" width="64" height="34" rx="17" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="905" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#1e3a8a">Done</text>
    <text x="905" y="291" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748b">More confident</text>
  </g>

  <line x1="220" y1="374" x2="388" y2="374" stroke="#fed7aa" stroke-width="2"/>
  <line x1="612" y1="374" x2="780" y2="374" stroke="#fed7aa" stroke-width="2"/>
  <text x="500" y="379" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#9a3412">Real judgment is not brought back each round</text>

  <g filter="url(#shadow)">
    <rect x="118" y="420" width="764" height="110" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="500" y="455" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#172033">Real shipping gates stay outside the loop</text>
    <rect x="156" y="484" width="158" height="32" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="235" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#9a3412">Auth unproven</text>
    <rect x="338" y="484" width="158" height="32" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="417" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#9a3412">Eligibility unproven</text>
    <rect x="520" y="484" width="158" height="32" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="599" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#9a3412">Failure unproven</text>
    <rect x="702" y="484" width="120" height="32" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="762" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#9a3412">Audit missing</text>
  </g>

  <text x="500" y="580" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#172033">Human-shaped Loop changes each round by pulling it back to real judgment, not the easiest proxy goal</text>
</svg>
